<!-- ════════ AUTH + SETTINGS VANILLA JS ════════ -->
<script>
(function () {
    function waitFb(cb) {
        if (window._fb) cb(); else window.addEventListener('fb-ready', cb, { once: true });
    }

    /* Google login */
    document.getElementById('btn-google-login').addEventListener('click', function () {
        waitFb(async () => {
            try { await window._fb.signInWithPopup(window._fb.auth, window._fb.provider); }
            catch (e) { alert('فشل تسجيل الدخول: ' + e.message); }
        });
    });

    /* Auth state */
    waitFb(() => {
        window._fb.onAuthStateChanged(window._fb.auth, async (user) => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('user-bar').classList.add('show');
                document.getElementById('app-screen').classList.add('show');

                document.getElementById('user-name').textContent = user.displayName || user.email || '';
                document.getElementById('user-avatar').src = user.photoURL || '';

                // show settings only for admin uid
                if (user.uid === window._ADMIN_UID) {
                    document.getElementById('btn-open-admin').style.display = 'inline-block';
                } else {
                    document.getElementById('btn-open-admin').style.display = 'none';
                }

                /* save profile */
                const { db, doc, setDoc } = window._fb;
                setDoc(doc(db, 'users', user.uid), {
                    displayName: user.displayName || user.email || '',
                    email: user.email || '',
                    photoURL: user.photoURL || '',
                    lastLogin: Date.now()
                }, { merge: true }).catch(() => {});
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('user-bar').classList.remove('show');
                document.getElementById('app-screen').classList.remove('show');
                document.getElementById('btn-open-admin').style.display = 'none';
                if (window._fbUnsub) { window._fbUnsub(); window._fbUnsub = null; }
            }
        });
    });

    /* Sign out */
    document.getElementById('btn-signout').addEventListener('click', () => {
        if (confirm('هل تريد تسجيل الخروج؟'))
            waitFb(() => window._fb.signOut(window._fb.auth));
    });

    /* SETTINGS PANEL OPEN/CLOSE */
    document.getElementById('btn-open-admin').addEventListener('click', () => {
        document.getElementById('admin-panel').classList.add('show');
        waitFb(() => window._loadSettingsIntoAdminPanel());
    });
    document.getElementById('btn-close-admin').addEventListener('click', () => {
        document.getElementById('admin-panel').classList.remove('show');
    });

    // Settings helpers
    const DEFAULT_SETTINGS = {
        defaultMonthlyIncome: 16500,
        monthlyBudget: 16500,
        notifyLevels: [75,85,95]
    };

    window._loadSettingsIntoAdminPanel = async function () {
        const user = window._fb.auth.currentUser;
        if (!user) return;
        const { db, doc, getDoc, setDoc } = window._fb;

        // IMPORTANT:
        // settings تُخزن تحت UID الزوجة دائمًا (لأنها "حساب البيت" الفعلي)
        const ref = doc(db, 'users', window._WIFE_UID, 'settings', 'main');

        const snap = await getDoc(ref);
        let s = snap.exists() ? (snap.data() || {}) : {};
        // bootstrap
        if (!snap.exists()) {
            s = { ...DEFAULT_SETTINGS, updatedAt: Date.now() };
            await setDoc(ref, s);
        } else {
            // fill missing keys to keep compatibility
            s = { ...DEFAULT_SETTINGS, ...s };
        }

        document.getElementById('adm-income').value = s.defaultMonthlyIncome ?? 16500;
        document.getElementById('adm-budget').value = s.monthlyBudget ?? 16500;
    };

    document.getElementById('btn-reset-settings').addEventListener('click', () => {
        document.getElementById('adm-income').value = 16500;
        document.getElementById('adm-budget').value = 16500;
    });

    document.getElementById('btn-save-settings').addEventListener('click', () => {
        waitFb(async () => {
            const user = window._fb.auth.currentUser;
            if (!user) return;
            if (user.uid !== window._ADMIN_UID) return alert('غير مصرح');

            const income = parseFloat(document.getElementById('adm-income').value || '0');
            const budget = parseFloat(document.getElementById('adm-budget').value || '0');
            if (!(income >= 0) || !(budget > 0)) return alert('أدخل قيم صحيحة');

            const { db, doc, setDoc } = window._fb;
            // IMPORTANT: write settings under wife's UID (house data)
            await setDoc(doc(db, 'users', window._WIFE_UID, 'settings', 'main'), {
                defaultMonthlyIncome: income,
                monthlyBudget: budget,
                notifyLevels: [75,85,95],
                updatedAt: Date.now()
            }, { merge: true });

            alert('تم حفظ الإعدادات ✅');
        });
    });
})();
</script>

<!-- ════════ REACT APP ════════ -->
<script type="text/babel">
const { useState, useEffect, useMemo } = React;
const { PieChart, Pie, Cell, ResponsiveContainer, Tooltip } = window.Recharts;

const Icon = ({ name, size=20, className='' }) => {
    useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, []);
    return <i data-lucide={name} style={{ width:size, height:size }} className={className}></i>;
};

const CATS = [
    'خضار وفاكهه','فراخ','لحوم','علافة و توابل','مسحوق غسيل',
    'مناديل','منظفات ارضيات','معجون','زيت وسمن','مكرونة و رز',
    'صوصات وصلصة','شامبو وكريمات','عيش و فينو','مخبوزات',
    'جبن و البان','سوبر ماركت','أدوية','أخرى'
];
const COLORS = ['#6366F1','#EF4444','#10B981','#F59E0B','#8B5CF6','#EC4899','#06B6D4','#F97316','#14B8A6','#F43F5E'];

const now = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; };
const fmtMonth = m => {
    if (m==='الكل') return 'كافة الشهور';
    const [y,mo]=m.split('-');
    const lbl = new Date(y,parseInt(mo)-1).toLocaleDateString('ar-EG',{month:'long',year:'numeric'});
    return m===now()?`${lbl} (الحالي)`:lbl;
};

const App = () => {
    const [expenses,setExpenses]   = useState([]);
    const [user,setUser]           = useState(null);

    // settings (تُقرأ من UID الزوجة دائمًا)
    const [settings, setSettings] = useState({ defaultMonthlyIncome: 16500, monthlyBudget: 16500, notifyLevels: [75,85,95] });

    // expense form
    const [title,setTitle]         = useState('');
    const [amount,setAmount]       = useState('');
    const [cat,setCat]             = useState(CATS[0]);
    const [date,setDate]           = useState(new Date().toISOString().split('T')[0]);

    // filters
    const [fCat,setFCat]           = useState('الكل');
    const [fMonth,setFMonth]       = useState(now());

    // ui
    const [reminder,setReminder]   = useState(false);
    const [alertLevel, setAlertLevel] = useState(null); // 75/85/95
    const [editExp, setEditExp] = useState(null); // expense object being edited
    const [editTitle, setEditTitle] = useState('');
    const [editAmount, setEditAmount] = useState('');
    const [editCat, setEditCat] = useState(CATS[0]);
    const [editDate, setEditDate] = useState(new Date().toISOString().split('T')[0]);

    const isAdmin = !!user && user.uid === window._ADMIN_UID;
    const isWife  = !!user && user.uid === window._WIFE_UID;

    // IMPORTANT:
    // كل البيانات "بيت واحد" = تحت UID الزوجة
    const dataUid = window._WIFE_UID;

    const loadSettings = async () => {
        const { db, doc, getDoc, setDoc } = window._fb;
        const ref = doc(db, 'users', dataUid, 'settings', 'main');
        const snap = await getDoc(ref);
        const defaults = { defaultMonthlyIncome: 16500, monthlyBudget: 16500, notifyLevels: [75,85,95] };

        if (!snap.exists()) {
            const init = { ...defaults, updatedAt: Date.now() };
            await setDoc(ref, init);
            setSettings(init);
        } else {
            setSettings({ ...defaults, ...(snap.data() || {}) });
        }
    };

    useEffect(() => {
        const init = () => {
            const {auth,onAuthStateChanged,db,collection,query,orderBy,onSnapshot} = window._fb;

            onAuthStateChanged(auth, u => {
                setUser(u||null);

                if (window._fbUnsub) { window._fbUnsub(); window._fbUnsub = null; }

                if (u) {
                    // load settings + subscribe expenses for wifeUid (house data)
                    loadSettings().catch(()=>{});

                    const q = query(collection(db,'users',dataUid,'expenses'),orderBy('createdAt','desc'));
                    window._fbUnsub = onSnapshot(q, s => setExpenses(s.docs.map(d=>({id:d.id,...d.data()}))));
                } else {
                    setExpenses([]);
                    setSettings({ defaultMonthlyIncome: 16500, monthlyBudget: 16500, notifyLevels: [75,85,95] });
                }
            });
        };
        if (window._fb) init(); else window.addEventListener('fb-ready',init,{once:true});
    },[]);

    useEffect(() => { if (window.lucide) window.lucide.createIcons(); },[expenses, editExp, alertLevel]);

    useEffect(() => {
        if (new Date().getDate()===1) {
            const d=new Date(); d.setMonth(d.getMonth()-1);
            const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
            if (!localStorage.getItem(`exported_${k}`) && expenses.some(e=>e.date?.startsWith(k)))
                setReminder(true);
        }
    },[expenses]);

    const months = useMemo(()=>[...new Set([...expenses.map(e=>e.date?.slice(0,7)).filter(Boolean),now()])].sort().reverse(),[expenses]);
    const filtered = useMemo(()=>expenses.filter(e=>(fMonth==='الكل'||e.date?.startsWith(fMonth))&&(fCat==='الكل'||e.category===fCat)),[expenses,fMonth,fCat]);
    const total    = useMemo(()=>filtered.reduce((s,e)=>s+(e.amount||0),0),[filtered]);
    const maxExp   = useMemo(()=>filtered.length?Math.max(...filtered.map(e=>e.amount||0)):0,[filtered]);
    const topCats  = useMemo(()=>{const m={};filtered.forEach(e=>{m[e.category]=(m[e.category]||0)+(e.amount||0);});return Object.entries(m).map(([n,v])=>({n,v})).sort((a,b)=>b.v-a.v).slice(0,3);},[filtered]);
    const chartData= useMemo(()=>{const m={};filtered.forEach(e=>{m[e.category]=(m[e.category]||0)+(e.amount||0);});return Object.entries(m).map(([name,value])=>({name,value}));},[filtered]);

    const monthlyIncome = settings?.defaultMonthlyIncome ?? 16500;
    const monthlyBudget = settings?.monthlyBudget ?? 16500;
    const budgetPct = useMemo(() => monthlyBudget ? (total / monthlyBudget) * 100 : 0, [total, monthlyBudget]);
    const remaining = useMemo(() => monthlyIncome - total, [monthlyIncome, total]);

    // Progressive alerts (75/85/95) for selected month only (not "all")
    useEffect(() => {
        if (!user) return;
        if (!monthlyBudget || monthlyBudget <= 0) return;
        if (fMonth === 'الكل') return;

        const run = async () => {
            const levels = (settings?.notifyLevels || [75,85,95]).slice().sort((a,b)=>a-b);
            const pct = (total / monthlyBudget) * 100;
            const reached = levels.filter(l => pct >= l).sort((a,b)=>b-a)[0] || null;
            if (!reached) return;

            const { db, doc, getDoc, setDoc, updateDoc } = window._fb;
            const ref = doc(db, 'users', dataUid, 'settings', `alerts_${fMonth}`);
            const snap = await getDoc(ref);

            if (!snap.exists()) {
                await setDoc(ref, { lastNotifiedLevel: 0, updatedAt: Date.now() });
            }

            const last = snap.exists() ? (snap.data()?.lastNotifiedLevel || 0) : 0;
            if (reached > last) {
                setAlertLevel(reached);
                await updateDoc(ref, { lastNotifiedLevel: reached, updatedAt: Date.now() });
            }
        };

        run().catch(()=>{});
    }, [user, settings, monthlyBudget, total, fMonth]);

    const addExpense = async ev => {
        ev.preventDefault();
        // الزوجة فقط تضيف
        if (!isWife) return alert('الإضافة مسموحة للزوجة فقط');

        if (!title||!amount) return;

        const val = parseFloat(amount);
        if (!(val > 0)) return alert('أدخل مبلغ صحيح');

        const {db,collection,addDoc}=window._fb;
        await addDoc(collection(db,'users',dataUid,'expenses'),{
            title,
            amount: val,
            category: cat,
            date,
            createdAt: Date.now(),
            updatedAt: Date.now()
        });

        setTitle('');
        setAmount('');
        setFMonth(date.slice(0,7));
    };

    const delExpense = async id => {
        // التعديل/الحذف: للزوجة + للأدمن
        if (!(isWife || isAdmin)) return alert('غير مصرح');
        if (!confirm('هل أنت متأكد من حذف هذا البند؟')) return;
        const {db,doc,deleteDoc}=window._fb;
        await deleteDoc(doc(db,'users',dataUid,'expenses',id));
    };

    const openEdit = (exp) => {
        // التعديل: للزوجة + للأدمن
        if (!(isWife || isAdmin)) return alert('غير مصرح');
        setEditExp(exp);
        setEditTitle(exp.title || '');
        setEditAmount(String(exp.amount ?? ''));
        setEditCat(exp.category || CATS[0]);
        setEditDate(exp.date || new Date().toISOString().split('T')[0]);
    };

    const saveEdit = async () => {
        if (!user || !editExp) return;
        if (!(isWife || isAdmin)) return alert('غير مصرح');

        const val = parseFloat(editAmount);
        if (!editTitle.trim() || !(val > 0)) return alert('أدخل بيانات صحيحة');

        const { db, doc, updateDoc } = window._fb;
        await updateDoc(doc(db,'users',dataUid,'expenses',editExp.id),{
            title: editTitle.trim(),
            amount: val,
            category: editCat,
            date: editDate,
            updatedAt: Date.now(),
            updatedBy: user.uid
        });

        setEditExp(null);
    };

    const exportCsv = (tm='all') => {
        const data = tm==='all'?expenses:expenses.filter(e=>e.date?.startsWith(tm));
        if (!data.length){alert('لا توجد بيانات');return;}
        const t=data.reduce((s,e)=>s+(e.amount||0),0);
        const csv='\uFEFF'+[
            ['التاريخ','الوصف','القسم','المبلغ (ج.م)'],
            ...data.map(e=>[e.date,e.title,e.category,e.amount]),
            ['','','الإجمالي',t]
        ].map(r=>r.join(',')).join('\n');
        const a=document.createElement('a');
        a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
        a.download=`مصروفات_${tm==='all'?'كاملة':tm}.csv`; a.click();
        if(tm!=='all'){localStorage.setItem(`exported_${tm}`,'true');setReminder(false);}
    };

    return (
        <div className="min-h-screen p-3 sm:p-4 md:p-6 lg:p-8 xl:p-10">
            <div className="max-w-screen-xl mx-auto space-y-4 sm:space-y-5 lg:space-y-6">

                {alertLevel && fMonth !== 'الكل' && (
                    <div className="bg-rose-50 border-2 border-rose-200 p-4 sm:p-5 rounded-3xl flex flex-col sm:flex-row items-center justify-between gap-4">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-rose-600 text-white rounded-2xl flex items-center justify-center flex-shrink-0">
                                <Icon name="triangle-alert" size={20}/>
                            </div>
                            <div>
                                <h3 className="text-rose-900 font-black text-sm">تنبيه ميزانية!</h3>
                                <p className="text-rose-700 text-xs font-bold">
                                    وصلت إلى {alertLevel}% من الميزانية في شهر {fmtMonth(fMonth)}.
                                </p>
                            </div>
                        </div>
                        <div className="flex gap-2 flex-shrink-0">
                            <button onClick={()=>setAlertLevel(null)} className="bg-white text-rose-700 border border-rose-200 px-4 py-2 rounded-xl font-black text-xs hover:bg-rose-100">
                                فهمت
                            </button>
                        </div>
                    </div>
                )}

                {reminder && (
                    <div className="bg-amber-50 border-2 border-amber-200 p-4 sm:p-5 rounded-3xl flex flex-col sm:flex-row items-center justify-between gap-4">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-amber-500 text-white rounded-2xl flex items-center justify-content-center flex-shrink-0"><Icon name="bell" size={20}/></div>
                            <div>
                                <h3 className="text-amber-900 font-black text-sm">تذكير بأرشفة الشهر الماضي!</h3>
                                <p className="text-amber-700 text-xs font-bold">هل تود تصدير سجل الشهر السابق؟</p>
                            </div>
                        </div>
                        <div className="flex gap-2 flex-shrink-0">
                            <button onClick={()=>{const d=new Date();d.setMonth(d.getMonth()-1);exportCsv(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);}} className="bg-amber-600 text-white px-4 py-2 rounded-xl font-black text-xs hover:bg-amber-700 transition-all">تصدير الآن</button>
                            <button onClick={()=>setReminder(false)} className="bg-white text-amber-600 border border-amber-200 px-4 py-2 rounded-xl font-bold text-xs hover:bg-amber-100">لاحقاً</button>
                        </div>
                    </div>
                )}

                {/* Stats Row */}
                <div className="grid grid-cols-1 sm:grid-cols-4 gap-3 sm:gap-4">

                    <div className="bg-white p-4 sm:p-5 lg:p-6 rounded-2xl sm:rounded-3xl shadow-sm border border-slate-100 flex flex-col justify-between min-h-[100px]">
                        <div className="flex items-center justify-between">
                            <h1 className="text-sm sm:text-base lg:text-lg font-black text-slate-800 flex items-center gap-2">
                                <Icon name="layout-dashboard" className="text-indigo-600" size={20}/>الشهر
                            </h1>
                            <button onClick={()=>exportCsv('all')} className="p-2 bg-slate-50 text-slate-400 rounded-xl hover:text-emerald-600 hover:bg-emerald-50 transition-all"><Icon name="download" size={16}/></button>
                        </div>
                        <div className="mt-3">
                            <p className="text-[9px] sm:text-[10px] font-black text-slate-400 uppercase tracking-widest">المحدد</p>
                            <p className="text-xs sm:text-sm lg:text-base font-bold text-indigo-900">{fmtMonth(fMonth)}</p>
                        </div>
                    </div>

                    <div className="bg-indigo-600 p-4 sm:p-5 lg:p-6 rounded-2xl sm:rounded-3xl text-white shadow-lg shadow-indigo-100 flex flex-col justify-center">
                        <span className="text-[9px] sm:text-[10px] font-black opacity-80 uppercase tracking-widest">إجمالي المصروفات</span>
                        <div className="text-2xl sm:text-3xl lg:text-4xl font-black leading-none my-1">{total.toLocaleString()} <span className="text-sm font-normal">ج.م</span></div>
                        <div className="mt-2 pt-2 border-t border-indigo-400/30 flex justify-between text-xs">
                            <span className="font-bold opacity-80">أعلى عملية:</span>
                            <span className="font-black">{maxExp.toLocaleString()} ج.م</span>
                        </div>
                    </div>

                    <div className="bg-emerald-600 p-4 sm:p-5 lg:p-6 rounded-2xl sm:rounded-3xl text-white shadow-lg shadow-emerald-100 flex flex-col justify-center">
                        <span className="text-[9px] sm:text-[10px] font-black opacity-80 uppercase tracking-widest">الدخل الشهري</span>
                        <div className="text-2xl sm:text-3xl lg:text-4xl font-black leading-none my-1">{monthlyIncome.toLocaleString()} <span className="text-sm font-normal">ج.م</span></div>
                        <div className="mt-2 pt-2 border-t border-emerald-400/30 flex justify-between text-xs">
                            <span className="font-bold opacity-80">المتبقي:</span>
                            <span className="font-black">{remaining.toLocaleString()} ج.م</span>
                        </div>
                    </div>

                    <div className="bg-white p-4 sm:p-5 lg:p-6 rounded-2xl sm:rounded-3xl shadow-sm border border-slate-100">
                        <h3 className="text-[10px] font-black text-slate-400 uppercase mb-2 flex items-center gap-1">
                            <Icon name="trending-up" size={12} className="text-pink-500"/>استهلاك الميزانية
                        </h3>

                        <div className="text-xs font-black text-slate-700 flex items-center justify-between mb-2">
                            <span>الميزانية:</span>
                            <span className="text-indigo-700">{monthlyBudget.toLocaleString()} ج.م</span>
                        </div>

                        <div className="w-full h-3 bg-slate-100 rounded-full overflow-hidden">
                            <div
                                className={`h-full ${budgetPct>=95?'bg-rose-600':budgetPct>=85?'bg-orange-500':budgetPct>=75?'bg-amber-500':'bg-emerald-500'}`}
                                style={{ width: `${Math.min(100, Math.max(0, budgetPct))}%` }}
                            ></div>
                        </div>

                        <div className="mt-2 text-[11px] font-black text-slate-500 flex justify-between">
                            <span>{budgetPct.toFixed(1)}%</span>
                            <span>{Math.max(0, monthlyBudget - total).toLocaleString()} ج.م متبقي من الميزانية</span>
                        </div>

                        <div className="mt-3 space-y-2 sm:space-y-2.5">
                            <div className="text-[10px] font-black text-slate-400 uppercase">أعلى 3 فئات</div>
                            {topCats.length>0?topCats.map((c,i)=>(
                                <div key={c.n} className="flex items-center justify-between">
                                    <div className="flex items-center gap-2">
                                        <span className="w-4 h-4 sm:w-5 sm:h-5 flex items-center justify-center bg-slate-100 text-[9px] sm:text-[10px] font-black rounded-full text-slate-500">{i+1}</span>
                                        <span className="text-xs sm:text-sm font-bold text-slate-700 truncate max-w-[120px]">{c.n}</span>
                                    </div>
                                    <span className="text-xs sm:text-sm font-black text-indigo-600 flex-shrink-0">{c.v.toLocaleString()} <span className="text-[9px] font-normal text-slate-400">ج.م</span></span>
                                </div>
                            )):<div className="text-xs italic text-slate-300">لا توجد بيانات كافية</div>}
                        </div>
                    </div>
                </div>

                {/* Main Grid */}
                <div className="grid grid-cols-1 lg:grid-cols-12 gap-4 sm:gap-5 lg:gap-6">

                    {/* Form */}
                    <div className="lg:col-span-4">
                        <div className="bg-white p-4 sm:p-5 lg:p-6 rounded-2xl sm:rounded-3xl shadow-sm border border-slate-100 lg:sticky lg:top-16">
                            <div className="flex items-center justify-between mb-4">
                                <h2 className="text-sm sm:text-base lg:text-lg font-bold flex items-center gap-2 text-slate-800">
                                    <Icon name="plus-circle" className="text-indigo-500" size={18}/>إضافة مصروف
                                </h2>
                                {isAdmin && (
                                    <span className="text-[10px] font-black text-amber-700 bg-amber-50 border border-amber-200 px-2 py-1 rounded-xl">
                                        أدمن (متابعة/تعديل)
                                    </span>
                                )}
                                {isWife && (
                                    <span className="text-[10px] font-black text-emerald-700 bg-emerald-50 border border-emerald-200 px-2 py-1 rounded-xl">
                                        إدخال بيانات
                                    </span>
                                )}
                            </div>

                            {!isWife && (
                                <div className="bg-slate-50 border border-slate-200 p-4 rounded-2xl text-slate-700 text-sm font-bold leading-relaxed">
                                    هذا الحساب للمتابعة فقط. <span className="text-indigo-700 font-black">إضافة المصروفات مسموحة للزوجة فقط.</span>
                                </div>
                            )}

                            <form onSubmit={addExpense} className={`space-y-3 ${!isWife?'opacity-60 pointer-events-none':''}`}>
                                <div>
                                    <label className="text-xs font-bold text-slate-400 block mb-1">وصف المصروف</label>
                                    <input type="text" value={title} onChange={e=>setTitle(e.target.value)} placeholder="مثلاً: خضار الأسبوع" className="w-full p-3 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold text-slate-800 text-sm" required/>
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-slate-400 block mb-1">المبلغ (ج.م)</label>
                                    <input type="number" inputMode="decimal" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="0.00" className="w-full p-3 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-black text-xl text-indigo-900" required/>
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-slate-400 block mb-1">التصنيف</label>
                                    <select value={cat} onChange={e=>setCat(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-100 rounded-2xl outline-none font-bold cursor-pointer text-slate-700 text-sm">
                                        {CATS.map(c=><option key={c} value={c}>{c}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-slate-400 block mb-1">التاريخ</label>
                                    <input type="date" value={date} onChange={e=>setDate(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-100 rounded-2xl outline-none font-bold text-slate-700 text-sm"/>
                                </div>
                                <button type="submit" className="w-full py-3 bg-indigo-600 text-white font-black rounded-2xl shadow-lg hover:bg-indigo-700 active:scale-95 transition-all text-sm">☁️ حفظ العملية</button>
                            </form>
                        </div>
                    </div>

                    {/* Right */}
                    <div className="lg:col-span-8 space-y-4 sm:space-y-5">

                        <div className="bg-white p-4 sm:p-5 rounded-2xl sm:rounded-3xl border border-slate-100 shadow-sm grid grid-cols-1 sm:grid-cols-2 gap-3">
                            <div>
                                <label className="text-[10px] font-black text-slate-400 uppercase block mb-1">الشهر</label>
                                <select value={fMonth} onChange={e=>setFMonth(e.target.value)} className="w-full p-3 bg-pink-50 border border-pink-100 rounded-2xl outline-none font-bold text-pink-700 cursor-pointer text-sm">
                                    <option value="الكل">كل السجل</option>
                                    {months.map(m=><option key={m} value={m}>{fmtMonth(m)}</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="text-[10px] font-black text-slate-400 uppercase block mb-1">التصنيف</label>
                                <select value={fCat} onChange={e=>setFCat(e.target.value)} className="w-full p-3 bg-indigo-50 border border-indigo-100 rounded-2xl outline-none font-bold text-indigo-700 cursor-pointer text-sm">
                                    <option value="الكل">جميع التصنيفات</option>
                                    {CATS.map(c=><option key={c} value={c}>{c}</option>)}
                                </select>
                            </div>
                        </div>

                        <div className="bg-white p-4 sm:p-5 lg:p-6 rounded-2xl sm:rounded-3xl shadow-sm border border-slate-100">
                            <h2 className="text-sm sm:text-base font-bold mb-4 flex items-center gap-2 text-slate-800">
                                <Icon name="pie-chart" className="text-indigo-500" size={18}/>توزيع مصاريف الشهر
                            </h2>
                            <div className="h-44 sm:h-56 lg:h-64 w-full">
                                {chartData.length>0?(
                                    <ResponsiveContainer width="100%" height="100%">
                                        <PieChart>
                                            <Pie data={chartData} innerRadius="38%" outerRadius="62%" paddingAngle={4} dataKey="value">
                                                {chartData.map((_,i)=><Cell key={i} fill={COLORS[i%COLORS.length]}/>)}
                                            </Pie>
                                            <Tooltip contentStyle={{borderRadius:'12px',border:'none',boxShadow:'0 8px 24px rgba(0,0,0,0.1)',textAlign:'right',fontFamily:'Cairo',fontSize:'13px'}} itemStyle={{fontWeight:'bold'}}/>
                                        </PieChart>
                                    </ResponsiveContainer>
                                ):(
                                    <div className="h-full flex items-center justify-center text-slate-300 italic font-bold text-sm">لا توجد بيانات لهذا الشهر</div>
                                )}
                            </div>
                        </div>

                        <div className="bg-white rounded-2xl sm:rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                            <div className="p-4 sm:p-5 bg-slate-50/50 border-b font-bold flex justify-between items-center text-slate-700 text-sm">
                                <span>قائمة المصروفات ({filtered.length})</span>
                                <Icon name="arrow-down-narrow-wide" size={16}/>
                            </div>
                            <div className="max-h-[350px] sm:max-h-[450px] lg:max-h-[550px] overflow-y-auto custom-scrollbar divide-y divide-slate-50">
                                {filtered.length>0?filtered.map(exp=>(
                                    <div key={exp.id} className="p-3 sm:p-4 lg:p-5 flex justify-between items-center hover:bg-slate-50 transition-colors group">
                                        <div className="flex gap-2 sm:gap-3 items-center min-w-0">
                                            <div className="w-8 h-8 sm:w-10 sm:h-10 bg-slate-100 rounded-xl flex items-center justify-center text-slate-400 group-hover:bg-indigo-100 group-hover:text-indigo-600 transition-colors flex-shrink-0">
                                                <Icon name="receipt" size={15}/>
                                            </div>
                                            <div className="min-w-0">
                                                <div className="font-bold text-slate-800 text-xs sm:text-sm truncate">{exp.title}</div>
                                                <div className="text-[10px] text-slate-400 font-bold flex gap-2 mt-0.5 flex-wrap">
                                                    <span>{exp.date}</span>
                                                    <span className="text-indigo-500 font-black">#{exp.category}</span>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-2 sm:gap-3 flex-shrink-0">
                                            <div className="text-left">
                                                <div className="text-sm sm:text-lg font-black text-slate-800">{(exp.amount||0).toLocaleString()}</div>
                                                <div className="text-[9px] text-slate-400 font-bold uppercase">جنية</div>
                                            </div>

                                            {(isWife || isAdmin) && (
                                                <>
                                                    <button onClick={()=>openEdit(exp)} className="p-1.5 text-slate-200 hover:text-indigo-500 transition-colors" title="تعديل">
                                                        <Icon name="pencil" size={17}/>
                                                    </button>
                                                    <button onClick={()=>delExpense(exp.id)} className="p-1.5 text-slate-200 hover:text-red-500 transition-colors" title="حذف">
                                                        <Icon name="x-circle" size={17}/>
                                                    </button>
                                                </>
                                            )}
                                        </div>
                                    </div>
                                )):(
                                    <div className="p-12 sm:p-16 text-center text-slate-300 font-bold italic text-sm">السجل فارغ لهذا الاختيار</div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>

                {/* Edit Modal */}
                {editExp && (
                    <div className="fixed inset-0 z-[3000] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4" onClick={()=>setEditExp(null)}>
                        <div className="bg-white w-full max-w-md rounded-3xl p-5 sm:p-6 shadow-2xl border border-slate-100" onClick={(e)=>e.stopPropagation()}>
                            <div className="flex items-center justify-between mb-4">
                                <h3 className="font-black text-slate-800 text-sm">✏️ تعديل المصروف</h3>
                                <button className="text-slate-400 hover:text-slate-700" onClick={()=>setEditExp(null)}>✕</button>
                            </div>

                            <div className="space-y-3">
                                <div>
                                    <label className="text-xs font-bold text-slate-400 block mb-1">الوصف</label>
                                    <input value={editTitle} onChange={e=>setEditTitle(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold text-slate-800 text-sm"/>
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-slate-400 block mb-1">المبلغ (ج.م)</label>
                                    <input type="number" inputMode="decimal" value={editAmount} onChange={e=>setEditAmount(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-black text-xl text-indigo-900"/>
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-slate-400 block mb-1">التصنيف</label>
                                    <select value={editCat} onChange={e=>setEditCat(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-100 rounded-2xl outline-none font-bold cursor-pointer text-slate-700 text-sm">
                                        {CATS.map(c=><option key={c} value={c}>{c}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-slate-400 block mb-1">التاريخ</label>
                                    <input type="date" value={editDate} onChange={e=>setEditDate(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-100 rounded-2xl outline-none font-bold text-slate-700 text-sm"/>
                                </div>

                                <div className="flex gap-2 pt-2">
                                    <button onClick={saveEdit} className="flex-1 py-3 bg-indigo-600 text-white font-black rounded-2xl shadow-lg hover:bg-indigo-700 active:scale-95 transition-all text-sm">
                                        حفظ التعديل
                                    </button>
                                    <button onClick={()=>setEditExp(null)} className="px-4 py-3 bg-white border border-slate-200 text-slate-700 font-black rounded-2xl hover:bg-slate-50 text-sm">
                                        إلغاء
                                    </button>
                                </div>
                            </div>

                        </div>
                    </div>
                )}

            </div>
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
