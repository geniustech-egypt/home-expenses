<!-- ════════ AUTH + ADMIN VANILLA JS ════════ -->
<script>
(function () {
  function waitFb(cb) {
    if (window._fb) cb(); else window.addEventListener('fb-ready', cb, { once: true });
  }

  const PRIMARY_UID = () => window._PRIMARY_UID;
  const ADMIN_UID = () => window._ADMIN_UID;

  function isPrimary(user) { return !!user && user.uid === PRIMARY_UID(); }
  function isAdmin(user) { return !!user && user.uid === ADMIN_UID(); }

  function _safeName(str) {
    const s = (str || '').trim();
    // لو ما فيش displayName، لا نظهر الإيميل (حسب طلبك)
    return s || 'مستخدم';
  }

  function showLoginOnly() {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('user-bar').classList.remove('show');
    document.getElementById('app-screen').classList.remove('show');
    document.getElementById('admin-panel').classList.remove('show');
    if (window._fbUnsub) { window._fbUnsub(); window._fbUnsub = null; }
  }

  function showUnauthorizedAndSignOut() {
    alert('غير مصرح لهذا الحساب.');
    showLoginOnly();
    waitFb(() => window._fb.signOut(window._fb.auth));
  }

  /* Google login */
  document.getElementById('btn-google-login').addEventListener('click', function () {
    waitFb(async () => {
      try { await window._fb.signInWithPopup(window._fb.auth, window._fb.provider); }
      catch (e) { alert('فشل تسجيل الدخول: ' + e.message); }
    });
  });

  /* Admin modal open/close */
  document.getElementById('btn-show-admin-modal').addEventListener('click', function () {
    document.getElementById('admin-modal').classList.add('show');
    setTimeout(() => document.getElementById('admin-email').focus(), 120);
  });

  function closeModal() {
    document.getElementById('admin-modal').classList.remove('show');
    document.getElementById('admin-error').style.display = 'none';
    document.getElementById('admin-email').value = '';
    document.getElementById('admin-password').value = '';
    document.getElementById('btn-admin-submit').disabled = false;
    document.getElementById('btn-admin-submit').textContent = 'دخول';
  }
  document.getElementById('btn-admin-cancel').addEventListener('click', closeModal);
  document.getElementById('admin-modal').addEventListener('click', function (e) {
    if (e.target === this) closeModal();
  });

  async function doAdminLogin() {
    const email    = document.getElementById('admin-email').value.trim();
    const password = document.getElementById('admin-password').value;
    const btn      = document.getElementById('btn-admin-submit');
    const errEl    = document.getElementById('admin-error');
    if (!email || !password) return;
    btn.disabled = true; btn.textContent = 'جاري الدخول...';
    errEl.style.display = 'none';
    try {
      await window._fb.signInWithEmailAndPassword(window._fb.auth, email, password);
      closeModal();
    } catch (e) {
      errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'دخول';
    }
  }
  document.getElementById('btn-admin-submit').addEventListener('click', () => waitFb(doAdminLogin));
  document.getElementById('admin-password').addEventListener('keydown', e => { if (e.key === 'Enter') waitFb(doAdminLogin); });

  /* Sign out */
  document.getElementById('btn-signout').addEventListener('click', () => {
    if (confirm('هل تريد تسجيل الخروج؟')) waitFb(() => window._fb.signOut(window._fb.auth));
  });

  document.getElementById('btn-close-admin').addEventListener('click', () => {
    waitFb(() => window._fb.signOut(window._fb.auth));
  });

  // ──────────────────────────────────────────────────────────────
  // Admin: view + edit + delete + KPI cards (spent + income + remaining)
  // + إخفاء الإيميل في كل مكان
  // ──────────────────────────────────────────────────────────────

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
  }

  const _DEF_INCOME = 16500;

  async function _getPrimaryIncome() {
    try {
      const { db, doc, getDoc } = window._fb;
      const snap = await getDoc(doc(db, 'users', PRIMARY_UID(), 'settings', 'main'));
      if (snap.exists()) {
        const data = snap.data() || {};
        const income = parseFloat(data.defaultMonthlyIncome);
        if (income >= 0) return income;
      }
    } catch (_) {}
    return _DEF_INCOME;
  }

  function _setAdminTopbarFilterText(fm, fc) {
    const el = document.getElementById('admin-summary-bar');
    if (!el) return;
    const labelMonth = (fm && fm !== 'الكل') ? `شهر ${fm}` : 'كل السجل';
    const labelCat = (fc && fc !== 'الكل') ? ` | تصنيف: ${fc}` : '';
    el.textContent = `عرض: ${labelMonth}${labelCat}`;
  }

  function _adminKpisHtml(income, spent, remaining) {
    return `
      <div class="admin-kpis">
        <div class="kpi-card kpi-income">
          <div class="kpi-top">
            <div>
              <div class="kpi-label">الدخل الشهري</div>
              <div class="kpi-value">${Number(income).toLocaleString()} <span style="font-size:12px;font-weight:800;color:#64748b">ج.م</span></div>
              <div class="kpi-sub"><span class="kpi-tag">مصدره: الإعدادات</span></div>
            </div>
            <div class="kpi-icon">💵</div>
          </div>
        </div>

        <div class="kpi-card kpi-spent">
          <div class="kpi-top">
            <div>
              <div class="kpi-label">إجمالي المصروفات</div>
              <div class="kpi-value">${Number(spent).toLocaleString()} <span style="font-size:12px;font-weight:800;color:#64748b">ج.م</span></div>
              <div class="kpi-sub">حسب الفلاتر الحالية</div>
            </div>
            <div class="kpi-icon">🧾</div>
          </div>
        </div>

        <div class="kpi-card ${remaining < 0 ? 'kpi-negative' : 'kpi-rem'}">
          <div class="kpi-top">
            <div>
              <div class="kpi-label">المتبقي</div>
              <div class="kpi-value">${Number(remaining).toLocaleString()} <span style="font-size:12px;font-weight:800;color:#64748b">ج.م</span></div>
              <div class="kpi-sub">${remaining < 0 ? '⚠️ تم تجاوز الدخل' : 'متبقي من الدخل'}</div>
            </div>
            <div class="kpi-icon">${remaining < 0 ? '⚠️' : '📌'}</div>
          </div>
        </div>
      </div>
    `;
  }

  // Admin local cache (بدون email)
  let adminData = { expenses: [], profile: { displayName: 'المستخدم الأساسي' } };

  async function loadPrimaryExpensesForAdmin() {
    const wrap = document.getElementById('admin-expenses-wrap');
    wrap.innerHTML = '<div class="no-selection">جاري التحميل...</div>';

    const currentUser = window._fb.auth.currentUser;
    if (!currentUser || currentUser.uid !== ADMIN_UID()) {
      wrap.innerHTML = '<div class="no-selection" style="color:#ef4444">غير مصرح</div>';
      return;
    }

    try {
      const { db, collection, getDocs, query, orderBy, doc, getDoc } = window._fb;

      // profile (optional) - لا نحتاج email
      let profile = { displayName: 'المستخدم الأساسي' };
      try {
        const pSnap = await getDoc(doc(db, 'users', PRIMARY_UID()));
        if (pSnap.exists()) {
          const p = pSnap.data() || {};
          profile = { displayName: p.displayName || 'المستخدم الأساسي' };
        }
      } catch (_) {}

      const eSnap = await getDocs(query(collection(db,'users',PRIMARY_UID(),'expenses'), orderBy('createdAt','desc')));
      const expenses = eSnap.docs.map(d => ({ id: d.id, ...d.data() }));

      adminData = { profile, expenses };
      await renderAdminExpenses('الكل','الكل');
    } catch (e) {
      console.error(e);
      wrap.innerHTML = `<div class="no-selection" style="color:#ef4444">❌ خطأ: ${e.message}</div>`;
    }
  }

  async function renderAdminExpenses(fm, fc) {
    const wrap = document.getElementById('admin-expenses-wrap');
    const expenses = adminData.expenses || [];

    const months = [...new Set(expenses.map(e=>e.date?e.date.slice(0,7):null).filter(Boolean))].sort().reverse();
    const cats   = [...new Set(expenses.map(e=>e.category).filter(Boolean))];

    const list = expenses.filter(e => (fm==='الكل'||e.date?.startsWith(fm)) && (fc==='الكل'||e.category===fc));
    const total = list.reduce((s,e)=>s+(e.amount||0),0);

    const income = await _getPrimaryIncome();
    const remaining = income - total;

    window._admFilt = { fm, fc };

    _setAdminTopbarFilterText(fm, fc);

    wrap.innerHTML = `
      ${_adminKpisHtml(income, total, remaining)}

      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px">
        <div>
          <h3 style="font-size:15px;font-weight:900;color:#1e1b4b;margin:0">مصروفات: ${escapeHtml(adminData.profile?.displayName || 'المستخدم الأساسي')}</h3>
        </div>
        <button class="btn-export-admin" onclick="window._expCsvAdmin()">⬇ تصدير CSV</button>
      </div>

      <div class="admin-filters">
        <select class="admin-select" id="adm-m" onchange="window._renderAdm(this.value,document.getElementById('adm-c').value)">
          <option value="الكل">كل الشهور</option>
          ${months.map(m=>`<option value="${m}" ${m===fm?'selected':''}>${m}</option>`).join('')}
        </select>
        <select class="admin-select" id="adm-c" onchange="window._renderAdm(document.getElementById('adm-m').value,this.value)">
          <option value="الكل">كل التصنيفات</option>
          ${cats.map(c=>`<option value="${escapeHtml(c)}" ${c===fc?'selected':''}>${escapeHtml(c)}</option>`).join('')}
        </select>
      </div>

      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead><tr><th>التاريخ</th><th>الوصف</th><th>التصنيف</th><th>المبلغ</th><th>إجراءات</th></tr></thead>
          <tbody>
            ${list.length ? list.map(e=>`
              <tr>
                <td>${e.date||'-'}</td>
                <td>${escapeHtml(e.title||'-')}</td>
                <td>${escapeHtml(e.category||'-')}</td>
                <td style="font-weight:700;color:#4338ca">${(e.amount||0).toLocaleString()} ج.م</td>
                <td style="white-space:nowrap">
                  <button class="btn-mini btn-mini-primary" onclick="window._editExpenseAdmin('${e.id}')">تعديل</button>
                  <button class="btn-mini btn-mini-danger" onclick="window._delExpenseAdmin('${e.id}')">حذف</button>
                </td>
              </tr>
            `).join('') + `
              <tr class="admin-total"><td colspan="3">الإجمالي</td><td>${total.toLocaleString()} ج.م</td><td></td></tr>
            ` : `
              <tr><td colspan="5" style="text-align:center;color:#9ca3af;padding:28px">لا توجد بيانات</td></tr>
            `}
          </tbody>
        </table>
      </div>
    `;
  }

  // filters call
  window._renderAdm = (fm, fc) => { renderAdminExpenses(fm, fc); };

  window._delExpenseAdmin = async (expId) => {
    const currentUser = window._fb.auth.currentUser;
    if (!currentUser || currentUser.uid !== ADMIN_UID()) return alert('غير مصرح');
    if (!confirm('حذف هذا البند؟')) return;

    try {
      const { db, doc, deleteDoc } = window._fb;
      await deleteDoc(doc(db,'users',PRIMARY_UID(),'expenses',expId));
      await loadPrimaryExpensesForAdmin();
      const { fm, fc } = window._admFilt || { fm:'الكل', fc:'الكل' };
      await renderAdminExpenses(fm, fc);
    } catch (e) {
      alert('فشل الحذف: ' + e.message);
    }
  };

  window._editExpenseAdmin = async (expId) => {
    const currentUser = window._fb.auth.currentUser;
    if (!currentUser || currentUser.uid !== ADMIN_UID()) return alert('غير مصرح');

    const exp = (adminData.expenses || []).find(x => x.id === expId);
    if (!exp) return;

    const title = prompt('الوصف:', exp.title || '');
    if (title === null) return;

    const amountStr = prompt('المبلغ (ج.م):', String(exp.amount ?? ''));
    if (amountStr === null) return;
    const amount = parseFloat(amountStr);
    if (!(amount > 0)) return alert('مبلغ غير صحيح');

    const category = prompt('التصنيف:', exp.category || '');
    if (category === null) return;

    const date = prompt('التاريخ (YYYY-MM-DD):', exp.date || '');
    if (date === null) return;

    try {
      const { db, doc, updateDoc } = window._fb;
      await updateDoc(doc(db,'users',PRIMARY_UID(),'expenses',expId), {
        title: title.trim(),
        amount,
        category: category.trim(),
        date: date.trim(),
        updatedAt: Date.now(),
        updatedBy: currentUser.uid
      });

      await loadPrimaryExpensesForAdmin();
      const { fm, fc } = window._admFilt || { fm:'الكل', fc:'الكل' };
      await renderAdminExpenses(fm, fc);
    } catch (e) {
      alert('فشل التعديل: ' + e.message);
    }
  };

  window._expCsvAdmin = () => {
    const { fm, fc } = window._admFilt || { fm:'الكل', fc:'الكل' };
    const expenses = adminData.expenses || [];
    const list = expenses.filter(e => (fm==='الكل'||e.date?.startsWith(fm)) && (fc==='الكل'||e.category===fc));
    if (!list.length) { alert('لا توجد بيانات'); return; }
    const total = list.reduce((s,e)=>s+(e.amount||0),0);

    const csv = '\uFEFF'+[['التاريخ','الوصف','التصنيف','المبلغ (ج.م)'],
      ...list.map(e=>[e.date,e.title,e.category,e.amount]),
      ['','','الإجمالي',total]
    ].map(r=>r.join(',')).join('\n');

    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
    a.download = `مصروفات_${fm}.csv`;
    a.click();
  };

  // ──────────────────────────────────────────────────────────────
  // Auth gating: admin goes directly to admin screen, primary to app
  // + لا نظهر الإيميل في الشريط العلوي مطلقاً
  // ──────────────────────────────────────────────────────────────
  waitFb(() => {
    window._fb.onAuthStateChanged(window._fb.auth, async (user) => {
      if (!user) {
        showLoginOnly();
        return;
      }

      // allow only primary or admin
      if (!isPrimary(user) && !isAdmin(user)) {
        showUnauthorizedAndSignOut();
        return;
      }

      // user bar always visible after login (NAME ONLY)
      document.getElementById('user-bar').classList.add('show');
      document.getElementById('user-name').textContent = _safeName(user.displayName);
      document.getElementById('user-avatar').src = user.photoURL || '';

      // save profile (we can still store email in Firestore if you want, but not display it)
      const { db, doc, setDoc } = window._fb;
      setDoc(doc(db, 'users', user.uid), {
        displayName: user.displayName || '',
        email: user.email || '',       // محفوظ لكن غير معروض
        photoURL: user.photoURL || '',
        lastLogin: Date.now()
      }, { merge: true }).catch(() => {});

      // ADMIN: go directly to admin expenses view
      if (isAdmin(user)) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-screen').classList.remove('show');
        document.getElementById('admin-panel').classList.add('show');
        await loadPrimaryExpensesForAdmin();
        return;
      }

      // PRIMARY: show the normal app
      if (isPrimary(user)) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('admin-panel').classList.remove('show');
        document.getElementById('app-screen').classList.add('show');
        return;
      }
    });
  });
})();
</script>

<!-- ════════ REACT APP (Primary only) ════════ -->
<script type="text/babel">
const { useState, useEffect, useMemo } = React;
const { PieChart, Pie, Cell, ResponsiveContainer, Tooltip } = window.Recharts;

const Icon = ({ name, size=20, className='' }) => {
  useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, []);
  return <i data-lucide={name} style={{ width:size, height:size }} className={className}></i>;
};

const CATS = [
  'خضار وفاكهه','فراخ','لحوم','علافة و توابل','صيدلية','زيت وسمن','عيش و فينو','مخبوزات',
  'جبن و البان','سوبر ماركت','مواصلات','أخرى'
];
const COLORS = ['#6366F1','#EF4444','#10B981','#F59E0B','#8B5CF6','#EC4899','#06B6D4','#F97316','#14B8A6','#F43F5E'];

const now = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; };
const fmtMonth = m => {
  if (m==='الكل') return 'كافة الشهور';
  const [y,mo]=m.split('-');
  const lbl = new Date(y,parseInt(mo)-1).toLocaleDateString('ar-EG',{month:'long',year:'numeric'});
  return m===now()?`${lbl} (الحالي)`:lbl;
};

const App = () => {
  const [expenses,setExpenses]   = useState([]);
  const [user,setUser]           = useState(null);
  const [title,setTitle]         = useState('');
  const [amount,setAmount]       = useState('');
  const [cat,setCat]             = useState(CATS[0]);
  const [date,setDate]           = useState(new Date().toISOString().split('T')[0]);
  const [fCat,setFCat]           = useState('الكل');
  const [fMonth,setFMonth]       = useState(now());
  const [reminder,setReminder]   = useState(false);

  useEffect(() => {
    const init = () => {
      const {auth,onAuthStateChanged,db,collection,query,orderBy,onSnapshot} = window._fb;
      onAuthStateChanged(auth, u => {
        setUser(u||null);
        if (window._fbUnsub) { window._fbUnsub(); window._fbUnsub = null; }

        // React app is intended for primary only
        if (u && u.uid === window._PRIMARY_UID) {
          const q = query(collection(db,'users',u.uid,'expenses'),orderBy('createdAt','desc'));
          window._fbUnsub = onSnapshot(q, s => setExpenses(s.docs.map(d=>({id:d.id,...d.data()}))));
        } else {
          setExpenses([]);
        }
      });
    };
    if (window._fb) init(); else window.addEventListener('fb-ready',init,{once:true});
  },[]);

  useEffect(() => { if (window.lucide) window.lucide.createIcons(); },[expenses]);

  useEffect(() => {
    if (new Date().getDate()===1) {
      const d=new Date(); d.setMonth(d.getMonth()-1);
      const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      if (!localStorage.getItem(`exported_${k}`) && expenses.some(e=>e.date?.startsWith(k)))
        setReminder(true);
    }
  },[expenses]);

  const months = useMemo(()=>[...new Set([...expenses.map(e=>e.date?.slice(0,7)).filter(Boolean),now()])].sort().reverse(),[expenses]);
  const filtered = useMemo(()=>expenses.filter(e=>(fMonth==='الكل'||e.date?.startsWith(fMonth))&&(fCat==='الكل'||e.category===fCat)),[expenses,fMonth,fCat]);
  const total    = useMemo(()=>filtered.reduce((s,e)=>s+(e.amount||0),0),[filtered]);
  const maxExp   = useMemo(()=>filtered.length?Math.max(...filtered.map(e=>e.amount||0)):0,[filtered]);
  const topCats  = useMemo(()=>{const m={};filtered.forEach(e=>{m[e.category]=(m[e.category]||0)+(e.amount||0);});return Object.entries(m).map(([n,v])=>({n,v})).sort((a,b)=>b.v-a.v).slice(0,3);},[filtered]);
  const chartData= useMemo(()=>{const m={};filtered.forEach(e=>{m[e.category]=(m[e.category]||0)+(e.amount||0);});return Object.entries(m).map(([name,value])=>({name,value}));},[filtered]);

  const addExpense = async ev => {
    ev.preventDefault();
    if (!title||!amount||!user) return;
    if (user.uid !== window._PRIMARY_UID) return alert('غير مصرح');

    const val = parseFloat(amount);
    if (!(val > 0)) return alert('أدخل مبلغ صحيح');

    const {db,collection,addDoc}=window._fb;
    await addDoc(collection(db,'users',user.uid,'expenses'),{title,amount:val,category:cat,date,createdAt:Date.now()});
    setTitle(''); setAmount(''); setFMonth(date.slice(0,7));
  };

  const exportCsv = (tm='all') => {
    const data = tm==='all'?expenses:expenses.filter(e=>e.date?.startsWith(tm));
    if (!data.length){alert('لا توجد بيانات');return;}
    const t=data.reduce((s,e)=>s+(e.amount||0),0);
    const csv='\uFEFF'+[['التاريخ','الوصف','القسم','المبلغ (ج.م)'],...data.map(e=>[e.date,e.title,e.category,e.amount]),['','','الإجمالي',t]].map(r=>r.join(',')).join('\n');
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
    a.download=`مصروفات_${tm==='all'?'كاملة':tm}.csv`; a.click();
    if(tm!=='all'){localStorage.setItem(`exported_${tm}`,'true');setReminder(false);}
  };

  return (
    <div className="min-h-screen p-3 sm:p-4 md:p-6 lg:p-8 xl:p-10">
      <div className="max-w-screen-xl mx-auto space-y-4 sm:space-y-5 lg:space-y-6">

        {reminder && (
          <div className="bg-amber-50 border-2 border-amber-200 p-4 sm:p-5 rounded-3xl flex flex-col sm:flex-row items-center justify-between gap-4">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 bg-amber-500 text-white rounded-2xl flex items-center justify-center flex-shrink-0"><Icon name="bell" size={20}/></div>
              <div>
                <h3 className="text-amber-900 font-black text-sm">تذكير بأرشفة الشهر الماضي!</h3>
                <p className="text-amber-700 text-xs font-bold">هل تود تصدير سجل الشهر السابق؟</p>
              </div>
            </div>
            <div className="flex gap-2 flex-shrink-0">
              <button onClick={()=>{const d=new Date();d.setMonth(d.getMonth()-1);exportCsv(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);}} className="bg-amber-600 text-white px-4 py-2 rounded-xl font-black text-xs hover:bg-amber-700 transition-all">تصدير الآن</button>
              <button onClick={()=>setReminder(false)} className="bg-white text-amber-600 border border-amber-200 px-4 py-2 rounded-xl font-bold text-xs hover:bg-amber-100">لاحقاً</button>
            </div>
          </div>
        )}

        <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 sm:gap-4">
          <div className="bg-white p-4 sm:p-5 lg:p-6 rounded-2xl sm:rounded-3xl shadow-sm border border-slate-100 flex flex-col justify-between min-h-[100px]">
            <div className="flex items-center justify-between">
              <h1 className="text-sm sm:text-base lg:text-lg font-black text-slate-800 flex items-center gap-2">
                <Icon name="layout-dashboard" className="text-indigo-600" size={20}/>ميزانية المنزل
              </h1>
              <button onClick={()=>exportCsv('all')} className="p-2 bg-slate-50 text-slate-400 rounded-xl hover:text-emerald-600 hover:bg-emerald-50 transition-all"><Icon name="download" size={16}/></button>
            </div>
            <div className="mt-3">
              <p className="text-[9px] sm:text-[10px] font-black text-slate-400 uppercase tracking-widest">الشهر المختار</p>
              <p className="text-xs sm:text-sm lg:text-base font-bold text-indigo-900">{fmtMonth(fMonth)}</p>
            </div>
          </div>

          <div className="bg-indigo-600 p-4 sm:p-5 lg:p-6 rounded-2xl sm:rounded-3xl text-white shadow-lg shadow-indigo-100 flex flex-col justify-center">
            <span className="text-[9px] sm:text-[10px] font-black opacity-80 uppercase tracking-widest">إجمالي المصروفات</span>
            <div className="text-2xl sm:text-3xl lg:text-4xl font-black leading-none my-1">{total.toLocaleString()} <span className="text-sm font-normal">ج.م</span></div>
            <div className="mt-2 pt-2 border-t border-indigo-400/30 flex justify-between text-xs">
              <span className="font-bold opacity-80">أعلى عملية:</span>
              <span className="font-black">{maxExp.toLocaleString()} ج.م</span>
            </div>
          </div>

          <div className="bg-white p-4 sm:p-5 lg:p-6 rounded-2xl sm:rounded-3xl shadow-sm border border-slate-100">
            <h3 className="text-[10px] font-black text-slate-400 uppercase mb-3 flex items-center gap-1">
              <Icon name="trending-up" size={12} className="text-pink-500"/>أعلى 3 فئات
            </h3>
            <div className="space-y-2 sm:space-y-2.5">
              {topCats.length>0?topCats.map((c,i)=>(
                <div key={c.n} className="flex items-center justify-between">
                  <div className="flex items-center gap-2">
                    <span className="w-4 h-4 sm:w-5 sm:h-5 flex items-center justify-center bg-slate-100 text-[9px] sm:text-[10px] font-black rounded-full text-slate-500">{i+1}</span>
                    <span className="text-xs sm:text-sm font-bold text-slate-700 truncate max-w-[100px] sm:max-w-[130px]">{c.n}</span>
                  </div>
                  <span className="text-xs sm:text-sm font-black text-indigo-600 flex-shrink-0">{c.v.toLocaleString()} <span className="text-[9px] font-normal text-slate-400">ج.م</span></span>
                </div>
              )):<div className="text-xs italic text-slate-300">لا توجد بيانات كافية</div>}
            </div>
          </div>
        </div>

        <div className="grid grid-cols-1 lg:grid-cols-12 gap-4 sm:gap-5 lg:gap-6">
          <div className="lg:col-span-4">
            <div className="bg-white p-4 sm:p-5 lg:p-6 rounded-2xl sm:rounded-3xl shadow-sm border border-slate-100 lg:sticky lg:top-16">
              <h2 className="text-sm sm:text-base lg:text-lg font-bold mb-4 flex items-center gap-2 text-slate-800">
                <Icon name="plus-circle" className="text-indigo-500" size={18}/>إضافة بند
              </h2>
              <form onSubmit={addExpense} className="space-y-3">
                <div>
                  <label className="text-xs font-bold text-slate-400 block mb-1">وصف المصروف</label>
                  <input type="text" value={title} onChange={e=>setTitle(e.target.value)} placeholder="مثلاً: خضار الأسبوع" className="w-full p-3 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold text-slate-800 text-sm" required/>
                </div>
                <div>
                  <label className="text-xs font-bold text-slate-400 block mb-1">المبلغ (ج.م)</label>
                  <input type="number" inputMode="decimal" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="0.00" className="w-full p-3 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-black text-xl text-indigo-900" required/>
                </div>
                <div>
                  <label className="text-xs font-bold text-slate-400 block mb-1">التصنيف</label>
                  <select value={cat} onChange={e=>setCat(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-100 rounded-2xl outline-none font-bold cursor-pointer text-slate-700 text-sm">
                    {CATS.map(c=><option key={c} value={c}>{c}</option>)}
                  </select>
                </div>
                <div>
                  <label className="text-xs font-bold text-slate-400 block mb-1">التاريخ</label>
                  <input type="date" value={date} onChange={e=>setDate(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-100 rounded-2xl outline-none font-bold text-slate-700 text-sm"/>
                </div>
                <button type="submit" className="w-full py-3 bg-indigo-600 text-white font-black rounded-2xl shadow-lg hover:bg-indigo-700 active:scale-95 transition-all text-sm">☁️ حفظ العملية</button>
              </form>
            </div>
          </div>

          <div className="lg:col-span-8 space-y-4 sm:space-y-5">
            <div className="bg-white p-4 sm:p-5 rounded-2xl sm:rounded-3xl border border-slate-100 shadow-sm grid grid-cols-1 sm:grid-cols-2 gap-3">
              <div>
                <label className="text-[10px] font-black text-slate-400 uppercase block mb-1">الشهر</label>
                <select value={fMonth} onChange={e=>setFMonth(e.target.value)} className="w-full p-3 bg-pink-50 border border-pink-100 rounded-2xl outline-none font-bold text-pink-700 cursor-pointer text-sm">
                  <option value="الكل">كل السجل</option>
                  {months.map(m=><option key={m} value={m}>{fmtMonth(m)}</option>)}
                </select>
              </div>
              <div>
                <label className="text-[10px] font-black text-slate-400 uppercase block mb-1">التصنيف</label>
                <select value={fCat} onChange={e=>setFCat(e.target.value)} className="w-full p-3 bg-indigo-50 border border-indigo-100 rounded-2xl outline-none font-bold text-indigo-700 cursor-pointer text-sm">
                  <option value="الكل">جميع التصنيفات</option>
                  {CATS.map(c=><option key={c} value={c}>{c}</option>)}
                </select>
              </div>
            </div>

            <div className="bg-white p-4 sm:p-5 lg:p-6 rounded-2xl sm:rounded-3xl shadow-sm border border-slate-100">
              <h2 className="text-sm sm:text-base font-bold mb-4 flex items-center gap-2 text-slate-800">
                <Icon name="pie-chart" className="text-indigo-500" size={18}/>توزيع مصاريف الشهر
              </h2>
              <div className="h-44 sm:h-56 lg:h-64 w-full">
                {chartData.length>0?(
                  <ResponsiveContainer width="100%" height="100%">
                    <PieChart>
                      <Pie data={chartData} innerRadius="38%" outerRadius="62%" paddingAngle={4} dataKey="value">
                        {chartData.map((_,i)=><Cell key={i} fill={COLORS[i%COLORS.length]}/>)}
                      </Pie>
                      <Tooltip contentStyle={{borderRadius:'12px',border:'none',boxShadow:'0 8px 24px rgba(0,0,0,0.1)',textAlign:'right',fontFamily:'Cairo',fontSize:'13px'}} itemStyle={{fontWeight:'bold'}}/>
                    </PieChart>
                  </ResponsiveContainer>
                ):(
                  <div className="h-full flex items-center justify-center text-slate-300 italic font-bold text-sm">لا توجد بيانات لهذا الشهر</div>
                )}
              </div>
            </div>

            <div className="bg-white rounded-2xl sm:rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
              <div className="p-4 sm:p-5 bg-slate-50/50 border-b font-bold flex justify-between items-center text-slate-700 text-sm">
                <span>قائمة المصروفات ({filtered.length})</span>
                <Icon name="arrow-down-narrow-wide" size={16}/>
              </div>
              <div className="max-h-[350px] sm:max-h-[450px] lg:max-h-[550px] overflow-y-auto custom-scrollbar divide-y divide-slate-50">
                {filtered.length>0?filtered.map(exp=>(
                  <div key={exp.id} className="p-3 sm:p-4 lg:p-5 flex justify-between items-center hover:bg-slate-50 transition-colors group">
                    <div className="flex gap-2 sm:gap-3 items-center min-w-0">
                      <div className="w-8 h-8 sm:w-10 sm:h-10 bg-slate-100 rounded-xl flex items-center justify-center text-slate-400 group-hover:bg-indigo-100 group-hover:text-indigo-600 transition-colors flex-shrink-0">
                        <Icon name="receipt" size={15}/>
                      </div>
                      <div className="min-w-0">
                        <div className="font-bold text-slate-800 text-xs sm:text-sm truncate">{exp.title}</div>
                        <div className="text-[10px] text-slate-400 font-bold flex gap-2 mt-0.5 flex-wrap">
                          <span>{exp.date}</span>
                          <span className="text-indigo-500 font-black">#{exp.category}</span>
                        </div>
                      </div>
                    </div>
                    <div className="flex items-center gap-2 sm:gap-3 flex-shrink-0">
                      <div className="text-left">
                        <div className="text-sm sm:text-lg font-black text-slate-800">{(exp.amount||0).toLocaleString()}</div>
                        <div className="text-[9px] text-slate-400 font-bold uppercase">جنية</div>
                      </div>
                    </div>
                  </div>
                )):(
                  <div className="p-12 sm:p-16 text-center text-slate-300 font-bold italic text-sm">السجل فارغ لهذا الاختيار</div>
                )}
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
