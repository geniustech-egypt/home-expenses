<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مصروفاتي - إدارة مصروفات المنزل</title>

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#4f46e5" />

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet" />

  <!-- ✅ CSS moved to styles.css -->
  <link rel="stylesheet" href="styles.css" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- ✅ Excel export library (XLSX) -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged, signInWithEmailAndPassword }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore, collection, addDoc, deleteDoc, doc,
      onSnapshot, query, orderBy, getDocs, setDoc,
      updateDoc, getDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const app = initializeApp({
      apiKey: "AIzaSyAhaL-igY-b8MfT3CuXaxJHYmXGzPffOio",
      authDomain: "home-expenses-f80e2.firebaseapp.com",
      projectId: "home-expenses-f80e2",
      storageBucket: "home-expenses-f80e2.firebasestorage.app",
      messagingSenderId: "1034099100518",
      appId: "1:1034099100518:web:8742b844d36fa456b016a7"
    });

    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    window._fb = {
      auth, db, provider,
      signInWithPopup, signOut, onAuthStateChanged, signInWithEmailAndPassword,
      collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy, getDocs, setDoc,
      updateDoc, getDoc
    };

    // UIDs
    window._ADMIN_UID = 'j1l7huaXciN54etwobUCJdI7syy1';
    window._PRIMARY_UID = 'DjCKr8TgoyV1PW2y8ca6K2wzNho1';

    window.dispatchEvent(new Event('fb-ready'));
  </script>
</head>

<body>

<!-- Toasts -->
<div id="toast-root" aria-live="polite" aria-atomic="true"></div>

<!-- Shared Edit Modal -->
<div class="xmodal" id="edit-modal">
  <div class="xmodal-card">
    <div class="xmodal-head">
      <h3 class="xmodal-title" id="edit-modal-title">تعديل بند</h3>
      <button class="xmodal-x" id="edit-modal-x">✕</button>
    </div>

    <div class="xmodal-grid">
      <div class="span2">
        <label class="xmodal-label">الوصف</label>
        <input class="xmodal-input" id="em-title" type="text" />
      </div>

      <div>
        <label class="xmodal-label">المبلغ (ج.م)</label>
        <input class="xmodal-input" id="em-amount" type="number" inputmode="decimal" />
      </div>

      <div>
        <label class="xmodal-label">التاريخ</label>
        <input class="xmodal-input" id="em-date" type="date" />
      </div>

      <div class="span2">
        <label class="xmodal-label">التصنيف</label>
        <select class="xmodal-input" id="em-category"></select>
      </div>
    </div>

    <div class="xmodal-actions">
      <button class="xbtn xbtn-primary" id="em-save">حفظ التعديل</button>
      <button class="xbtn xbtn-danger" id="em-delete">حذف</button>
      <button class="xbtn xbtn-ghost" id="em-cancel">إلغاء</button>
    </div>
  </div>
</div>

<!-- ════════ LOGIN SCREEN ════════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">🏠</div>
    <h1>مصروفاتي</h1>
    <p class="subtitle">تطبيق إدارة مصروفات المنزل<br /></p>

    <button class="btn-login btn-login-google" id="btn-google-login">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      تسجيل الدخول بـ Google
    </button>

    <div class="or-divider"><span>أو</span></div>

    <button class="btn-login btn-login-admin" id="btn-show-admin-modal">
      🛡&nbsp; دخول الأدمن
    </button>
  </div>
</div>

<!-- ════════ ADMIN LOGIN MODAL ════════ -->
<div id="admin-modal">
  <div class="modal-card">
    <div style="font-size:40px;margin-bottom:14px">🛡</div>
    <h2>دخول الأدمن</h2>
    <p>أدخل بيانات حساب الأدمن<br />المسجّل على Firebase Authentication</p>
    <input class="modal-input" type="email" id="admin-email" placeholder="البريد الإلكتروني" dir="ltr" autocomplete="email" />
    <input class="modal-input" type="password" id="admin-password" placeholder="كلمة المرور" dir="ltr" autocomplete="current-password" />
    <div class="modal-error" id="admin-error">❌ بيانات خاطئة، تحقق وحاول مرة أخرى</div>
    <button class="btn-modal-submit" id="btn-admin-submit">دخول</button>
    <button class="btn-modal-cancel" id="btn-admin-cancel">إلغاء</button>
  </div>
</div>

<!-- ════════ USER BAR ════════ -->
<div id="user-bar">
  <div class="ubar-left">
    <img id="user-avatar" src="" alt="" />
    <span id="user-name"></span>
    <div class="sync-badge"><div class="sync-dot"></div> متزامن</div>
  </div>
  <div class="ubar-right">
    <button class="btn-bar btn-bar-signout" id="btn-signout">خروج</button>
  </div>
</div>

<!-- ════════ REACT APP (Primary only) ════════ -->
<div id="app-screen">
  <div id="root"></div>
</div>

<!-- ════════ ADMIN PANEL (Admin only) ════════ -->
<div id="admin-panel">
  <div class="admin-topbar">
    <div style="display:flex;flex-direction:column;gap:2px">
      <h1>🛡 متابعة المصروفات</h1>
      <div id="admin-summary-bar" style="font-size:12px;font-weight:800;opacity:.9;color:#e0e7ff">
        عرض: كل السجل
      </div>
    </div>
    <button class="btn-close-admin" id="btn-close-admin">✕ إغلاق</button>
  </div>
  <div class="admin-body">
    <div class="admin-expenses-wrap" id="admin-expenses-wrap">
      <div class="no-selection">جاري تحميل المصروفات...</div>
    </div>
  </div>
</div>

<!-- ==============================
     AUTH + ADMIN + MODAL + TOASTS
     ============================== -->
<script>
(function () {
  function waitFb(cb) {
    if (window._fb) cb(); else window.addEventListener('fb-ready', cb, { once: true });
  }

  const PRIMARY_UID = () => window._PRIMARY_UID;
  const ADMIN_UID = () => window._ADMIN_UID;

  function isPrimary(user) { return !!user && user.uid === PRIMARY_UID(); }
  function isAdmin(user) { return !!user && user.uid === ADMIN_UID(); }

  function _safeName(str) {
    const s = (str || '').trim();
    return s || 'مستخدم';
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
  }

  // Toast helper (global for React)
  function toast(type, title, msg, ms = 2800) {
    const root = document.getElementById('toast-root');
    const el = document.createElement('div');
    el.className = `toast ${type || 'info'}`;
    const icon = type === 'success' ? '✓' : type === 'error' ? '!' : 'i';
    el.innerHTML = `
      <div class="t-left">
        <div class="t-ic">${icon}</div>
        <div>
          <p class="t-title">${escapeHtml(title || '')}</p>
          <p class="t-msg">${escapeHtml(msg || '')}</p>
        </div>
      </div>
      <button class="t-close" aria-label="Close">✕</button>
    `;
    const close = () => { el.style.opacity = '0'; el.style.transform = 'translateY(-6px)'; setTimeout(()=>el.remove(), 180); };
    el.querySelector('.t-close').addEventListener('click', close);
    root.appendChild(el);
    setTimeout(close, ms);
  }
  window.toast = toast;

  // Categories (used by admin + edit modal)
  const CATS = [
    'خضار وفاكهه','فراخ','لحوم','علافة و توابل','مسحوق غسيل',
    'مناديل','منظفات ارضيات','معجون','زيت وسمن','مكرونة و رز',
    'صوصات وصلصة','شامبو وكريمات','عيش و فينو','مخبوزات',
    'جبن و البان','سوبر ماركت','أدوية','أخرى'
  ];

  // Populate categories in edit modal select
  function ensureModalCats() {
    const sel = document.getElementById('em-category');
    if (!sel) return;
    if (sel.dataset.ready === '1') return;
    sel.innerHTML = CATS.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
    sel.dataset.ready = '1';
  }

  // Shared edit modal (admin & primary)
  let _editCtx = { mode: null, id: null, uid: null, data: null }; // mode: 'primary'|'admin'
  function openEditModal({ mode, id, uid, data }) {
    ensureModalCats();
    _editCtx = { mode, id, uid, data };
    document.getElementById('em-title').value = data?.title || '';
    document.getElementById('em-amount').value = data?.amount ?? '';
    document.getElementById('em-date').value = data?.date || '';
    document.getElementById('em-category').value = data?.category || CATS[0];
    document.getElementById('edit-modal').classList.add('show');
  }
  function closeEditModal() {
    document.getElementById('edit-modal').classList.remove('show');
  }
  document.getElementById('edit-modal-x').addEventListener('click', closeEditModal);
  document.getElementById('em-cancel').addEventListener('click', closeEditModal);
  document.getElementById('edit-modal').addEventListener('click', (e)=>{ if(e.target.id==='edit-modal') closeEditModal(); });

  // Save/Delete
  document.getElementById('em-save').addEventListener('click', async () => {
    try {
      const title = document.getElementById('em-title').value.trim();
      const amount = parseFloat(document.getElementById('em-amount').value);
      const date = document.getElementById('em-date').value.trim();
      const category = document.getElementById('em-category').value.trim();

      if (!title) return toast('error','خطأ','أدخل الوصف');
      if (!(amount > 0)) return toast('error','خطأ','أدخل مبلغ صحيح');
      if (!date) return toast('error','خطأ','اختر تاريخ');

      const currentUser = window._fb.auth.currentUser;
      if (!currentUser) return toast('error','خطأ','غير مسجل');

      const { db, doc, updateDoc } = window._fb;
      await updateDoc(doc(db,'users', _editCtx.uid, 'expenses', _editCtx.id), {
        title, amount, category, date,
        updatedAt: Date.now(),
        updatedBy: currentUser.uid
      });

      toast('success','تم','تم حفظ التعديل');
      closeEditModal();

      if (_editCtx.mode === 'admin') {
        await loadPrimaryExpensesForAdmin();
        const { fm, fc } = window._admFilt || { fm:'الكل', fc:'الكل' };
        await renderAdminExpenses(fm, fc);
      }
    } catch (e) {
      toast('error','فشل', e.message || 'حدث خطأ');
    }
  });

  document.getElementById('em-delete').addEventListener('click', async () => {
    try {
      if (!confirm('حذف هذا البند؟')) return;

      const currentUser = window._fb.auth.currentUser;
      if (!currentUser) return toast('error','خطأ','غير مسجل');

      const { db, doc, deleteDoc } = window._fb;
      await deleteDoc(doc(db,'users', _editCtx.uid, 'expenses', _editCtx.id));

      toast('success','تم','تم حذف البند');
      closeEditModal();

      if (_editCtx.mode === 'admin') {
        await loadPrimaryExpensesForAdmin();
        const { fm, fc } = window._admFilt || { fm:'الكل', fc:'الكل' };
        await renderAdminExpenses(fm, fc);
      }
    } catch (e) {
      toast('error','فشل', e.message || 'حدث خطأ');
    }
  });

  // React bridge -> primary edit modal
  window.__openEditModalBridge = (exp) => {
    const u = window._fb?.auth?.currentUser;
    if (!u || u.uid !== window._PRIMARY_UID) return;
    openEditModal({ mode:'primary', id: exp.id, uid: u.uid, data: exp });
  };

  function showLoginOnly() {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('user-bar').classList.remove('show');
    document.getElementById('app-screen').classList.remove('show');
    document.getElementById('admin-panel').classList.remove('show');
    if (window._fbUnsub) { window._fbUnsub(); window._fbUnsub = null; }
  }

  function showUnauthorizedAndSignOut() {
    toast('error','غير مصرح','هذا الحساب غير مسموح');
    showLoginOnly();
    waitFb(() => window._fb.signOut(window._fb.auth));
  }

  /* Google login */
  document.getElementById('btn-google-login').addEventListener('click', function () {
    waitFb(async () => {
      try { await window._fb.signInWithPopup(window._fb.auth, window._fb.provider); }
      catch (e) { toast('error','فشل الدخول', e.message); }
    });
  });

  /* Admin modal open/close */
  document.getElementById('btn-show-admin-modal').addEventListener('click', function () {
    document.getElementById('admin-modal').classList.add('show');
    setTimeout(() => document.getElementById('admin-email').focus(), 120);
  });

  function closeAdminModal() {
    document.getElementById('admin-modal').classList.remove('show');
    document.getElementById('admin-error').style.display = 'none';
    document.getElementById('admin-email').value = '';
    document.getElementById('admin-password').value = '';
    document.getElementById('btn-admin-submit').disabled = false;
    document.getElementById('btn-admin-submit').textContent = 'دخول';
  }
  document.getElementById('btn-admin-cancel').addEventListener('click', closeAdminModal);
  document.getElementById('admin-modal').addEventListener('click', function (e) {
    if (e.target === this) closeAdminModal();
  });

  async function doAdminLogin() {
    const email    = document.getElementById('admin-email').value.trim();
    const password = document.getElementById('admin-password').value;
    const btn      = document.getElementById('btn-admin-submit');
    const errEl    = document.getElementById('admin-error');
    if (!email || !password) return;
    btn.disabled = true; btn.textContent = 'جاري الدخول...';
    errEl.style.display = 'none';
    try {
      await window._fb.signInWithEmailAndPassword(window._fb.auth, email, password);
      closeAdminModal();
    } catch (e) {
      errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'دخول';
      toast('error','فشل الدخول','تأكد من البيانات');
    }
  }
  document.getElementById('btn-admin-submit').addEventListener('click', () => waitFb(doAdminLogin));
  document.getElementById('admin-password').addEventListener('keydown', e => { if (e.key === 'Enter') waitFb(doAdminLogin); });

  /* Sign out */
  document.getElementById('btn-signout').addEventListener('click', () => {
    if (confirm('هل تريد تسجيل الخروج؟')) waitFb(() => window._fb.signOut(window._fb.auth));
  });

  document.getElementById('btn-close-admin').addEventListener('click', () => {
    waitFb(() => window._fb.signOut(window._fb.auth));
  });

  // ──────────────────────────────────────────────────────────────
  // Admin: KPI + filters + edit/delete + export (Excel)
  // ──────────────────────────────────────────────────────────────

  const _DEF_INCOME = 16500;

  async function _getPrimaryIncome() {
    try {
      const { db, doc, getDoc } = window._fb;
      const snap = await getDoc(doc(db, 'users', PRIMARY_UID(), 'settings', 'main'));
      if (snap.exists()) {
        const data = snap.data() || {};
        const income = parseFloat(data.defaultMonthlyIncome);
        if (income >= 0) return income;
      }
    } catch (_) {}
    return _DEF_INCOME;
  }

  function _setAdminTopbarFilterText(fm, fc) {
    const el = document.getElementById('admin-summary-bar');
    if (!el) return;
    const labelMonth = (fm && fm !== 'الكل') ? `شهر ${fm}` : 'كل السجل';
    const labelCat = (fc && fc !== 'الكل') ? ` | تصنيف: ${fc}` : '';
    el.textContent = `عرض: ${labelMonth}${labelCat}`;
  }

  function _pct(x) { return isFinite(x) ? Math.max(0, Math.min(999, x)) : 0; }

  function _adminKpisHtml(income, spent, remaining) {
    const ratio = income > 0 ? (spent / income) * 100 : 0;
    const r = _pct(ratio);
    const barClass = r < 70 ? 'kpi-p-good' : r < 95 ? 'kpi-p-warn' : 'kpi-p-bad';

    return `
      <div class="admin-kpis">
        <div class="kpi-card kpi-income">
          <div class="kpi-top">
            <div>
              <div class="kpi-label">الدخل الشهري</div>
              <div class="kpi-value">${Number(income).toLocaleString()} <span style="font-size:12px;font-weight:800;color:#64748b">ج.م</span></div>
              <div class="kpi-sub"><span class="kpi-tag">من الإعدادات</span></div>
            </div>
            <div class="kpi-icon">💵</div>
          </div>
        </div>

        <div class="kpi-card kpi-spent">
          <div class="kpi-top">
            <div>
              <div class="kpi-label">إجمالي المصروفات</div>
              <div class="kpi-value">${Number(spent).toLocaleString()} <span style="font-size:12px;font-weight:800;color:#64748b">ج.م</span></div>
              <div class="kpi-sub">نسبة الصرف: <b>${r.toFixed(0)}%</b></div>
              <div class="kpi-progress"><div class="${barClass}" style="width:${Math.min(100, r)}%"></div></div>
            </div>
            <div class="kpi-icon">🧾</div>
          </div>
        </div>

        <div class="kpi-card ${remaining < 0 ? 'kpi-negative' : 'kpi-rem'}">
          <div class="kpi-top">
            <div>
              <div class="kpi-label">المتبقي</div>
              <div class="kpi-value">${Number(remaining).toLocaleString()} <span style="font-size:12px;font-weight:800;color:#64748b">ج.م</span></div>
              <div class="kpi-sub">${remaining < 0 ? '⚠️ تم تجاوز الدخل' : 'متبقي من الدخل'}</div>
            </div>
            <div class="kpi-icon">${remaining < 0 ? '⚠️' : '📌'}</div>
          </div>
        </div>
      </div>
    `;
  }

  function _ym(d){
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  }

  let adminData = { expenses: [], profile: { displayName: 'المستخدم الأساسي' } };

  // ✅ Admin Excel export
  window._expXlsxAdmin = () => {
    const { fm, fc } = window._admFilt || { fm:'الكل', fc:'الكل' };
    const expenses = adminData.expenses || [];
    const list = expenses.filter(e => (fm==='الكل'||e.date?.startsWith(fm)) && (fc==='الكل'||e.category===fc));

    if (!list.length) { toast('info','تنبيه','لا توجد بيانات للتصدير'); return; }
    if (!window.XLSX) { toast('error','فشل','مكتبة Excel (XLSX) غير محملة'); return; }

    const total = list.reduce((s,e)=>s+(e.amount||0),0);

    const rows = [
      ['التاريخ','الوصف','التصنيف','المبلغ (ج.م)'],
      ...list.map(e => [e.date || '', e.title || '', e.category || '', e.amount || 0]),
      ['', '', 'الإجمالي', total]
    ];

    const wb = window.XLSX.utils.book_new();
    const ws = window.XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{ wch: 14 }, { wch: 36 }, { wch: 18 }, { wch: 14 }];
    window.XLSX.utils.book_append_sheet(wb, ws, 'Expenses');
    window.XLSX.writeFile(wb, `مصروفات_${fm}.xlsx`);

    toast('success','تم','تم تصدير ملف Excel');
  };

  async function loadPrimaryExpensesForAdmin() {
    const wrap = document.getElementById('admin-expenses-wrap');
    wrap.innerHTML = '<div class="no-selection">جاري التحميل...</div>';

    const currentUser = window._fb.auth.currentUser;
    if (!currentUser || currentUser.uid !== ADMIN_UID()) {
      wrap.innerHTML = '<div class="no-selection" style="color:#ef4444">غير مصرح</div>';
      return;
    }

    try {
      const { db, collection, getDocs, query, orderBy, doc, getDoc } = window._fb;

      let profile = { displayName: 'المستخدم الأساسي' };
      try {
        const pSnap = await getDoc(doc(db, 'users', PRIMARY_UID()));
        if (pSnap.exists()) {
          const p = pSnap.data() || {};
          profile = { displayName: p.displayName || 'المستخدم الأساسي' };
        }
      } catch (_) {}

      const eSnap = await getDocs(query(collection(db,'users',PRIMARY_UID(),'expenses'), orderBy('createdAt','desc')));
      const expenses = eSnap.docs.map(d => ({ id: d.id, ...d.data() }));

      adminData = { profile, expenses };
      await renderAdminExpenses('الكل','الكل');
    } catch (e) {
      wrap.innerHTML = `<div class="no-selection" style="color:#ef4444">❌ خطأ: ${escapeHtml(e.message)}</div>`;
      toast('error','خطأ', e.message || 'فشل التحميل');
    }
  }

  async function renderAdminExpenses(fm, fc) {
    const wrap = document.getElementById('admin-expenses-wrap');
    const expenses = adminData.expenses || [];

    const months = [...new Set(expenses.map(e=>e.date?e.date.slice(0,7):null).filter(Boolean))].sort().reverse();
    const cats   = [...new Set(expenses.map(e=>e.category).filter(Boolean))].sort((a,b)=>String(a).localeCompare(String(b),'ar'));

    const list = expenses.filter(e => (fm==='الكل'||e.date?.startsWith(fm)) && (fc==='الكل'||e.category===fc));
    const total = list.reduce((s,e)=>s+(e.amount||0),0);

    const income = await _getPrimaryIncome();
    const remaining = income - total;

    window._admFilt = { fm, fc };
    _setAdminTopbarFilterText(fm, fc);

    const t = new Date();
    const thisM = _ym(t);
    const prev = new Date(t.getFullYear(), t.getMonth()-1, 1);
    const prevM = _ym(prev);

    wrap.innerHTML = `
      ${_adminKpisHtml(income, total, remaining)}

      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin:6px 0 12px">
        <div>
          <h3 style="font-size:15px;font-weight:900;color:#1e1b4b;margin:0">مصروفات: ${escapeHtml(adminData.profile?.displayName || 'المستخدم الأساسي')}</h3>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn-quick" onclick="window._quickMonth('${thisM}')">هذا الشهر</button>
          <button class="btn-quick" onclick="window._quickMonth('${prevM}')">الشهر السابق</button>
          <button class="btn-export-admin" onclick="window._expXlsxAdmin()">⬇ تصدير Excel</button>
        </div>
      </div>

      <div class="admin-filters">
        <select class="admin-select" id="adm-m" onchange="window._renderAdm(this.value,document.getElementById('adm-c').value)">
          <option value="الكل">كل الشهور</option>
          ${months.map(m=>`<option value="${m}" ${m===fm?'selected':''}>${m}</option>`).join('')}
        </select>
        <select class="admin-select" id="adm-c" onchange="window._renderAdm(document.getElementById('adm-m').value,this.value)">
          <option value="الكل">كل التصنيفات</option>
          ${cats.map(c=>`<option value="${escapeHtml(c)}" ${c===fc?'selected':''}>${escapeHtml(c)}</option>`).join('')}
        </select>
      </div>

      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead><tr><th>التاريخ</th><th>الوصف</th><th>التصنيف</th><th>المبلغ</th><th>إجراءات</th></tr></thead>
          <tbody>
            ${list.length ? list.map(e=>`
              <tr>
                <td>${escapeHtml(e.date||'-')}</td>
                <td>${escapeHtml(e.title||'-')}</td>
                <td>${escapeHtml(e.category||'-')}</td>
                <td style="font-weight:900;color:#4338ca">${(e.amount||0).toLocaleString()} ج.م</td>
                <td style="white-space:nowrap">
                  <button class="btn-mini btn-mini-primary" onclick="window._adminEditOpen('${e.id}')">تعديل</button>
                  <button class="btn-mini btn-mini-danger" onclick="window._adminDeleteOpen('${e.id}')">حذف</button>
                </td>
              </tr>
            `).join('') + `
              <tr class="admin-total"><td colspan="3">الإجمالي</td><td>${total.toLocaleString()} ج.م</td><td></td></tr>
            ` : `
              <tr><td colspan="5" style="text-align:center;color:#9ca3af;padding:28px">لا توجد بيانات</td></tr>
            `}
          </tbody>
        </table>
      </div>
    `;
  }

  window._quickMonth = async (ym) => {
    const current = window._admFilt || { fm:'الكل', fc:'الكل' };
    await renderAdminExpenses(ym, current.fc || 'الكل');
  };

  window._renderAdm = (fm, fc) => { renderAdminExpenses(fm, fc); };

  window._adminEditOpen = (id) => {
    const exp = (adminData.expenses || []).find(x => x.id === id);
    if (!exp) return;
    openEditModal({ mode:'admin', id, uid: PRIMARY_UID(), data: exp });
  };
  window._adminDeleteOpen = (id) => {
    const exp = (adminData.expenses || []).find(x => x.id === id);
    if (!exp) return;
    openEditModal({ mode:'admin', id, uid: PRIMARY_UID(), data: exp });
  };

  // ──────────────────────────────────────────────────────────────
  // Auth gating: admin -> admin screen, primary -> app
  // ──────────────────────────────────────────────────────────────
  waitFb(() => {
    window._fb.onAuthStateChanged(window._fb.auth, async (user) => {
      if (!user) {
        showLoginOnly();
        return;
      }

      if (!isPrimary(user) && !isAdmin(user)) {
        showUnauthorizedAndSignOut();
        return;
      }

      document.getElementById('user-bar').classList.add('show');
      document.getElementById('user-name').textContent = _safeName(user.displayName);
      document.getElementById('user-avatar').src = user.photoURL || '';

      const { db, doc, setDoc } = window._fb;
      setDoc(doc(db, 'users', user.uid), {
        displayName: user.displayName || '',
        email: user.email || '',
        photoURL: user.photoURL || '',
        lastLogin: Date.now()
      }, { merge: true }).catch(() => {});

      if (isAdmin(user)) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-screen').classList.remove('show');
        document.getElementById('admin-panel').classList.add('show');
        await loadPrimaryExpensesForAdmin();
        toast('success','مرحبًا', 'تم الدخول كأدمن');
        return;
      }

      if (isPrimary(user)) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('admin-panel').classList.remove('show');
        document.getElementById('app-screen').classList.add('show');
        toast('success','مرحبًا', 'تم تسجيل الدخول');
        return;
      }
    });
  });
})();
</script>

<!-- ======================
     REACT APP (Primary)
     ====================== -->
<script type="text/babel">
const { useState, useEffect, useMemo } = React;
const { PieChart, Pie, Cell, ResponsiveContainer, Tooltip } = window.Recharts;

const Icon = ({ name, size=20, className='' }) => {
  useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, []);
  return <i data-lucide={name} style={{ width:size, height:size }} className={className}></i>;
};

const CATS = [
  'خضار وفاكهه','فراخ','لحوم','علافة و توابل','مسحوق غسيل',
  'مناديل','منظفات ارضيات','معجون','زيت وسمن','مكرونة و رز',
  'صوصات وصلصة','شامبو وكريمات','عيش و فينو','مخبوزات',
  'جبن و البان','سوبر ماركت','أدوية','أخرى'
];

const CAT_COLORS = {
  'خضار وفاكهه': '#10b981',
  'فراخ': '#ef4444',
  'لحوم': '#f97316',
  'علافة و توابل': '#8b5cf6',
  'مسحوق غسيل': '#06b6d4',
  'مناديل': '#ec4899',
  'منظفات ارضيات': '#6366f1',
  'معجون': '#14b8a6',
  'زيت وسمن': '#f59e0b',
  'مكرونة و رز': '#4338ca',
  'صوصات وصلصة': '#fb7185',
  'شامبو وكريمات': '#a855f7',
  'عيش و فينو': '#22c55e',
  'مخبوزات': '#eab308',
  'جبن و البان': '#60a5fa',
  'سوبر ماركت': '#94a3b8',
  'أدوية': '#0ea5e9',
  'أخرى': '#64748b'
};

const COLORS_FALLBACK = ['#6366F1','#EF4444','#10B981','#F59E0B','#8B5CF6','#EC4899','#06B6D4','#F97316','#14B8A6','#F43F5E'];

const nowYM = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; };
const ymOf = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;

const fmtMonth = m => {
  if (m==='الكل') return 'كافة الشهور';
  const [y,mo]=m.split('-');
  const lbl = new Date(y,parseInt(mo)-1).toLocaleDateString('ar-EG',{month:'long',year:'numeric'});
  return m===nowYM()?`${lbl} (الحالي)`:lbl;
};

const HIGH_THRESHOLD = 500;

const MonthExportModal = ({ show, monthKey, onExportNow }) => {
  if (!show) return null;

  const nice = (() => {
    const [y,m]=monthKey.split('-');
    return new Date(y, parseInt(m)-1).toLocaleDateString('ar-EG',{month:'long',year:'numeric'});
  })();

  return (
    <div className="fixed inset-0 z-[99999] bg-slate-900/70 backdrop-blur-sm flex items-center justify-center p-4">
      <div className="bg-white w-full max-w-lg rounded-3xl p-6 border-4 border-amber-300 shadow-2xl">
        <div className="flex items-start gap-3">
          <div className="w-12 h-12 rounded-2xl bg-amber-500 text-white flex items-center justify-center font-black text-xl flex-shrink-0">!</div>
          <div className="min-w-0">
            <h3 className="text-amber-900 font-black text-base sm:text-lg m-0">تنبيه مهم جدًا: تصدير بيانات الشهر السابق</h3>
            <p className="text-slate-600 font-bold text-sm mt-2 leading-7">
              أنت في <b>أول يوم من الشهر</b>.
              يجب تصدير بيانات <b>{nice}</b> الآن للحفظ/الأرشفة.
            </p>
          </div>
        </div>

        <div className="mt-5 flex flex-col sm:flex-row gap-3">
          <button
            onClick={onExportNow}
            className="w-full sm:w-auto bg-amber-600 hover:bg-amber-700 text-white font-black px-5 py-3 rounded-2xl">
            ⬇ تصدير الآن (Excel)
          </button>

          <a
            href="https://support.google.com/docs/answer/9331169?hl=ar"
            target="_blank"
            rel="noreferrer"
            className="w-full sm:w-auto text-center bg-white border-2 border-amber-200 text-amber-700 font-black px-5 py-3 rounded-2xl hover:bg-amber-50">
            طريقة فتح الملف
          </a>
        </div>

        <div className="mt-4 text-[12px] font-black text-slate-500">
          ملاحظة: لن تختفي هذه الرسالة إلا بعد تصدير الشهر السابق بنجاح.
        </div>
      </div>
    </div>
  );
};

const App = () => {
  const [expenses,setExpenses]   = useState([]);
  const [user,setUser]           = useState(null);
  const [income,setIncome]       = useState(0);

  const [title,setTitle]         = useState('');
  const [amount,setAmount]       = useState('');
  const [cat,setCat]             = useState(CATS[0]);
  const [date,setDate]           = useState(new Date().toISOString().split('T')[0]);

  const [fCat,setFCat]           = useState('الكل');
  const [fMonth,setFMonth]       = useState(nowYM());
  const [q,setQ]                 = useState('');

  // ✅ Mandatory export modal state
  const [mustExport, setMustExport] = useState(false);
  const [mustMonth, setMustMonth] = useState('');

  useEffect(() => {
    const init = () => {
      const {auth,onAuthStateChanged,db,collection,query,orderBy,onSnapshot,doc,getDoc} = window._fb;

      onAuthStateChanged(auth, async (u) => {
        setUser(u||null);

        if (u && u.uid === window._PRIMARY_UID) {
          try{
            const snap = await getDoc(doc(db,'users',u.uid,'settings','main'));
            if (snap.exists()) {
              const v = parseFloat((snap.data()||{}).defaultMonthlyIncome);
              setIncome(isFinite(v) ? v : 0);
            } else {
              setIncome(0);
            }
          }catch(_){ setIncome(0); }
        } else {
          setIncome(0);
        }

        if (window._fbUnsub) { window._fbUnsub(); window._fbUnsub = null; }
        if (u && u.uid === window._PRIMARY_UID) {
          const qx = query(collection(db,'users',u.uid,'expenses'),orderBy('createdAt','desc'));
          window._fbUnsub = onSnapshot(qx, s => setExpenses(s.docs.map(d=>({id:d.id,...d.data()}))));
        } else {
          setExpenses([]);
        }
      });
    };
    if (window._fb) init(); else window.addEventListener('fb-ready',init,{once:true});
  },[]);

  useEffect(() => { if (window.lucide) window.lucide.createIcons(); },[expenses]);

  const months = useMemo(()=>[...new Set([...expenses.map(e=>e.date?.slice(0,7)).filter(Boolean), nowYM()])].sort().reverse(),[expenses]);

  const filtered = useMemo(() => {
    const qq = q.trim().toLowerCase();
    return expenses.filter(e => {
      const okMonth = (fMonth==='الكل'||e.date?.startsWith(fMonth));
      const okCat = (fCat==='الكل'||e.category===fCat);
      const okQ = !qq || String(e.title||'').toLowerCase().includes(qq);
      return okMonth && okCat && okQ;
    });
  }, [expenses, fMonth, fCat, q]);

  // remaining based on selected month
  const spentForSelectedMonth = useMemo(() => {
    if (fMonth === 'الكل') return filtered.reduce((s,e)=>s+(e.amount||0),0);
    const monthOnly = expenses.filter(e => e.date?.startsWith(fMonth));
    return monthOnly.reduce((s,e)=>s+(e.amount||0),0);
  }, [expenses, filtered, fMonth]);

  const remainingForSelectedMonth = useMemo(() => income - spentForSelectedMonth, [income, spentForSelectedMonth]);

  const spendPct = useMemo(() => {
    if (!(income > 0)) return 0;
    return Math.max(0, Math.min(999, (spentForSelectedMonth / income) * 100));
  }, [income, spentForSelectedMonth]);

  const barClass = spendPct < 70 ? 'p-good' : spendPct < 95 ? 'p-warn' : 'p-bad';

  const totalFiltered = useMemo(()=>filtered.reduce((s,e)=>s+(e.amount||0),0),[filtered]);
  const maxExp   = useMemo(()=>filtered.length?Math.max(...filtered.map(e=>e.amount||0)):0,[filtered]);

  const chartData= useMemo(()=> {
    const m={}; filtered.forEach(e=>{m[e.category]=(m[e.category]||0)+(e.amount||0);});
    return Object.entries(m).map(([name,value])=>({name,value}));
  },[filtered]);

  const addExpense = async ev => {
    ev.preventDefault();
    if (!title||!amount||!user) return;
    if (user.uid !== window._PRIMARY_UID) return;

    const val = parseFloat(amount);
    if (!(val > 0)) { window.toast?.('error','خطأ','أدخل مبلغ صحيح'); return; }

    const {db,collection,addDoc}=window._fb;
    try {
      await addDoc(collection(db,'users',user.uid,'expenses'),{
        title, amount: val, category: cat, date,
        createdAt: Date.now()
      });
      setTitle(''); setAmount('');
      setFMonth(date.slice(0,7));
      window.toast?.('success','تم','تم حفظ العملية');
    } catch (e) {
      window.toast?.('error','فشل', e.message || 'حدث خطأ');
    }
  };

  // ✅ Excel export for user
  const exportExcel = (tm='all') => {
    const data = tm==='all'?expenses:expenses.filter(e=>e.date?.startsWith(tm));
    if (!data.length){ window.toast?.('info','تنبيه','لا توجد بيانات'); return; }
    if (!window.XLSX){ window.toast?.('error','فشل','مكتبة Excel (XLSX) غير محملة'); return; }

    const t=data.reduce((s,e)=>s+(e.amount||0),0);

    const rows = [
      ['التاريخ','الوصف','القسم','المبلغ (ج.م)'],
      ...data.map(e=>[e.date||'', e.title||'', e.category||'', e.amount||0]),
      ['','','الإجمالي', t]
    ];

    const wb = window.XLSX.utils.book_new();
    const ws = window.XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{ wch: 14 }, { wch: 36 }, { wch: 18 }, { wch: 14 }];
    window.XLSX.utils.book_append_sheet(wb, ws, 'Expenses');
    window.XLSX.writeFile(wb, `مصروفات_${tm==='all'?'كاملة':tm}.xlsx`);

    window.toast?.('success','تم','تم تصدير ملف Excel');

    if (tm !== 'all') {
      localStorage.setItem(`exported_${tm}`, 'true');
      // إخفاء الإلزام لو كان خاص بنفس الشهر
      if (mustMonth === tm) setMustExport(false);
    }
  };

  // ✅ Mandatory reminder only if: first day + previous month has data + not exported
  useEffect(() => {
    if (!user || user.uid !== window._PRIMARY_UID) return;

    const today = new Date();
    if (today.getDate() !== 1) return;

    const prev = new Date(today.getFullYear(), today.getMonth() - 1, 1);
    const key = `${prev.getFullYear()}-${String(prev.getMonth()+1).padStart(2,'0')}`;

    const already = localStorage.getItem(`exported_${key}`) === 'true';
    const hasData = expenses.some(e => e.date?.startsWith(key));

    if (hasData && !already) {
      setMustMonth(key);
      setMustExport(true);
    } else {
      setMustExport(false);
    }
  }, [expenses, user]);

  const exportMustMonthNow = () => {
    if (!mustMonth) return;
    exportExcel(mustMonth);
  };

  const quickThisMonth = () => setFMonth(nowYM());
  const quickPrevMonth = () => {
    const d = new Date();
    const prev = new Date(d.getFullYear(), d.getMonth()-1, 1);
    setFMonth(ymOf(prev));
  };

  const openPrimaryEdit = (exp) => {
    if (!user || user.uid !== window._PRIMARY_UID) return;
    window.__openEditModalBridge?.(exp);
  };

  return (
    <div className="min-h-screen p-3 sm:p-4 md:p-6 lg:p-8 xl:p-10">
      {/* ✅ Mandatory modal (blocks the app) */}
      <MonthExportModal show={mustExport} monthKey={mustMonth} onExportNow={exportMustMonthNow} />

      <div className="max-w-screen-xl mx-auto space-y-4 sm:space-y-5 lg:space-y-6">

        <div className="quick-row">
          <button className="qbtn" onClick={quickThisMonth}>هذا الشهر</button>
          <button className="qbtn" onClick={quickPrevMonth}>الشهر السابق</button>
          <button className="qbtn" onClick={()=>exportExcel('all')}>تصدير Excel</button>
        </div>

        <div className="kpi-grid-primary">
          <div className="p-kpi p-income">
            <div className="top">
              <div>
                <div className="label">الدخل الشهري</div>
                <div className="val">{Number(income||0).toLocaleString()} <span style={{fontSize:12,fontWeight:800,color:'#64748b'}}>ج.م</span></div>
                <div className="sub">ثابت شهريًا</div>
              </div>
              <div className="p-ic">💵</div>
            </div>
          </div>

          <div className="p-kpi p-spent">
            <div className="top">
              <div>
                <div className="label">مصروفات الشهر</div>
                <div className="val">{Number(spentForSelectedMonth||0).toLocaleString()} <span style={{fontSize:12,fontWeight:800,color:'#64748b'}}>ج.م</span></div>
                <div className="sub">حسب شهر: <b>{fMonth==='الكل'?'الكل':fMonth}</b> — <b>{Math.round(spendPct)}%</b></div>
                <div className="p-progress"><div className={barClass} style={{width: `${Math.min(100, spendPct)}%`}}></div></div>
              </div>
              <div className="p-ic">🧾</div>
            </div>
          </div>

          <div className={`p-kpi p-rem ${remainingForSelectedMonth < 0 ? 'neg':''}`}>
            <div className="top">
              <div>
                <div className="label">المتبقي من الدخل</div>
                <div className="val">{Number(remainingForSelectedMonth||0).toLocaleString()} <span style={{fontSize:12,fontWeight:800,color:'#64748b'}}>ج.م</span></div>
                <div className="sub">{remainingForSelectedMonth < 0 ? '⚠️ تم تجاوز الدخل' : 'متبقي'}</div>
              </div>
              <div className="p-ic">{remainingForSelectedMonth < 0 ? '⚠️' : '📌'}</div>
            </div>
          </div>

          <div className="p-kpi">
            <div className="top">
              <div>
                <div className="label">ملخص الفلتر</div>
                <div className="val">{Number(totalFiltered||0).toLocaleString()} <span style={{fontSize:12,fontWeight:800,color:'#64748b'}}>ج.م</span></div>
                <div className="sub">عمليات: <b>{filtered.length}</b> — أعلى بند: <b>{Number(maxExp||0).toLocaleString()}</b></div>
              </div>
              <div className="p-ic" style={{background:'linear-gradient(135deg,#ec4899,#be185d)'}}>📊</div>
            </div>
          </div>
        </div>

        <div className="grid grid-cols-1 lg:grid-cols-12 gap-4 sm:gap-5 lg:gap-6">
          {/* Add form */}
          <div className="lg:col-span-4">
            <div className="bg-white p-4 sm:p-5 lg:p-6 rounded-2xl sm:rounded-3xl shadow-sm border border-slate-100 lg:sticky lg:top-16">
              <h2 className="text-sm sm:text-base lg:text-lg font-bold mb-4 flex items-center gap-2 text-slate-800">
                <Icon name="plus-circle" className="text-indigo-500" size={18}/>إضافة بند
              </h2>

              <form onSubmit={addExpense} className="space-y-3">
                <div>
                  <label className="text-xs font-bold text-slate-400 block mb-1">وصف المصروف</label>
                  <input type="text" value={title} onChange={e=>setTitle(e.target.value)} placeholder="مثلاً: خضار الأسبوع"
                    className="w-full p-3 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold text-slate-800 text-sm" required/>
                </div>

                <div>
                  <label className="text-xs font-bold text-slate-400 block mb-1">المبلغ (ج.م)</label>
                  <input type="number" inputMode="decimal" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="0.00"
                    className="w-full p-3 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-black text-xl text-indigo-900" required/>
                </div>

                <div>
                  <label className="text-xs font-bold text-slate-400 block mb-1">التصنيف</label>
                  <select value={cat} onChange={e=>setCat(e.target.value)}
                    className="w-full p-3 bg-slate-50 border border-slate-100 rounded-2xl outline-none font-bold cursor-pointer text-slate-700 text-sm">
                    {CATS.map(c=><option key={c} value={c}>{c}</option>)}
                  </select>
                </div>

                <div>
                  <label className="text-xs font-bold text-slate-400 block mb-1">التاريخ</label>
                  <input type="date" value={date} onChange={e=>setDate(e.target.value)}
                    className="w-full p-3 bg-slate-50 border border-slate-100 rounded-2xl outline-none font-bold text-slate-700 text-sm"/>
                </div>

                <button type="submit"
                  className="w-full py-3 bg-indigo-600 text-white font-black rounded-2xl shadow-lg hover:bg-indigo-700 active:scale-95 transition-all text-sm">
                  ☁️ حفظ العملية
                </button>
              </form>
            </div>
          </div>

          {/* Filters + chart + list */}
          <div className="lg:col-span-8 space-y-4 sm:space-y-5">
            <div className="bg-white p-4 sm:p-5 rounded-2xl sm:rounded-3xl border border-slate-100 shadow-sm grid grid-cols-1 sm:grid-cols-3 gap-3">
              <div>
                <label className="text-[10px] font-black text-slate-400 uppercase block mb-1">الشهر</label>
                <select value={fMonth} onChange={e=>setFMonth(e.target.value)}
                  className="w-full p-3 bg-pink-50 border border-pink-100 rounded-2xl outline-none font-bold text-pink-700 cursor-pointer text-sm">
                  <option value="الكل">كل السجل</option>
                  {months.map(m=><option key={m} value={m}>{fmtMonth(m)}</option>)}
                </select>
              </div>

              <div>
                <label className="text-[10px] font-black text-slate-400 uppercase block mb-1">التصنيف</label>
                <select value={fCat} onChange={e=>setFCat(e.target.value)}
                  className="w-full p-3 bg-indigo-50 border border-indigo-100 rounded-2xl outline-none font-bold text-indigo-700 cursor-pointer text-sm">
                  <option value="الكل">جميع التصنيفات</option>
                  {CATS.map(c=><option key={c} value={c}>{c}</option>)}
                </select>
              </div>

              <div>
                <label className="text-[10px] font-black text-slate-400 uppercase block mb-1">بحث</label>
                <input value={q} onChange={e=>setQ(e.target.value)} placeholder="ابحث بالوصف..."
                  className="w-full p-3 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold text-slate-700 text-sm"/>
              </div>
            </div>

            <div className="bg-white p-4 sm:p-5 lg:p-6 rounded-2xl sm:rounded-3xl shadow-sm border border-slate-100">
              <h2 className="text-sm sm:text-base font-bold mb-4 flex items-center gap-2 text-slate-800">
                <Icon name="pie-chart" className="text-indigo-500" size={18}/>توزيع مصاريف الشهر
              </h2>
              <div className="h-44 sm:h-56 lg:h-64 w-full">
                {chartData.length>0?(
                  <ResponsiveContainer width="100%" height="100%">
                    <PieChart>
                      <Pie data={chartData} innerRadius="38%" outerRadius="62%" paddingAngle={4} dataKey="value">
                        {chartData.map((d,i)=>(
                          <Cell key={i} fill={CAT_COLORS[d.name] || COLORS_FALLBACK[i%COLORS_FALLBACK.length]} />
                        ))}
                      </Pie>
                      <Tooltip contentStyle={{borderRadius:'12px',border:'none',boxShadow:'0 8px 24px rgba(0,0,0,0.1)',textAlign:'right',fontFamily:'Cairo',fontSize:'13px'}}
                        itemStyle={{fontWeight:'bold'}}/>
                    </PieChart>
                  </ResponsiveContainer>
                ):(
                  <div className="h-full flex items-center justify-center text-slate-300 italic font-bold text-sm">لا توجد بيانات لهذا الشهر</div>
                )}
              </div>
            </div>

            <div className="bg-white rounded-2xl sm:rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
              <div className="p-4 sm:p-5 bg-slate-50/50 border-b font-bold flex justify-between items-center text-slate-700 text-sm">
                <span>قائمة المصروفات ({filtered.length})</span>
                <span className="text-[11px] font-black text-slate-400">اضغط للتعديل</span>
              </div>

              <div className="max-h-[350px] sm:max-h-[450px] lg:max-h-[550px] overflow-y-auto custom-scrollbar divide-y divide-slate-50">
                {filtered.length>0?filtered.map(exp=>(
                  <button key={exp.id}
                    onClick={()=>openPrimaryEdit(exp)}
                    className="w-full text-right p-3 sm:p-4 lg:p-5 flex justify-between items-center hover:bg-slate-50 transition-colors group">
                    <div className="flex gap-2 sm:gap-3 items-center min-w-0">
                      <div className="w-8 h-8 sm:w-10 sm:h-10 bg-slate-100 rounded-xl flex items-center justify-center text-slate-400 group-hover:bg-indigo-100 group-hover:text-indigo-600 transition-colors flex-shrink-0">
                        <Icon name="receipt" size={15}/>
                      </div>

                      <div className="min-w-0">
                        <div className="font-bold text-slate-800 text-xs sm:text-sm truncate">{exp.title}</div>

                        <div className="text-[10px] text-slate-400 font-bold flex gap-2 mt-0.5 flex-wrap items-center">
                          <span>{exp.date}</span>

                          <span className="cat-badge">
                            <span className="cat-dot" style={{background: CAT_COLORS[exp.category] || '#6366f1'}}></span>
                            {exp.category}
                          </span>

                          {(exp.amount||0) >= HIGH_THRESHOLD && <span className="big-badge">مرتفع</span>}
                        </div>
                      </div>
                    </div>

                    <div className="flex items-center gap-2 sm:gap-3 flex-shrink-0">
                      <div className="text-left">
                        <div className="text-sm sm:text-lg font-black text-slate-800">{(exp.amount||0).toLocaleString()}</div>
                        <div className="text-[9px] text-slate-400 font-bold uppercase">جنية</div>
                      </div>
                    </div>
                  </button>
                )):(
                  <div className="p-12 sm:p-16 text-center text-slate-300 font-bold italic text-sm">السجل فارغ لهذا الاختيار</div>
                )}
              </div>
            </div>

          </div>
        </div>

      </div>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

</body>
</html>
